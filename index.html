<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1E2B50">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Ready for School">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ready for School Tomorrow</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap');

.rst-root{
  --navy:#1E2B50; --navy-2:#2C3D6B; --navy-soft:#5A6A93;
  --yellow:#FFC93C; --yellow-soft:#FFE08A; --yellow-pale:#FFF6DC;
  --green:#5AB17A; --cream:#FBF7EF; --line:#E7E0D2;
  font-family:'Nunito',system-ui,sans-serif;
  color:var(--navy);
  background:radial-gradient(120% 60% at 50% -10%, #FFF7E0 0%, var(--cream) 55%);
  min-height:100vh; -webkit-tap-highlight-color:transparent;
}
/* Respect the iPhone status bar / notch when installed to the Home Screen
   (viewport-fit=cover lets the app draw under it, so we pad it back). */
.rst-app{ max-width:880px; margin:0 auto;
  padding:calc(18px + env(safe-area-inset-top, 0px)) calc(16px + env(safe-area-inset-right, 0px)) calc(44px + env(safe-area-inset-bottom, 0px)) calc(16px + env(safe-area-inset-left, 0px)); }
@media (display-mode: standalone){
  /* Installed app: no browser chrome above, so give a little extra breathing room. */
  .rst-app{ padding-top:calc(26px + env(safe-area-inset-top, 0px)); }
}

/* header */
.rst-header{
  display:flex; align-items:center; gap:14px;
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);
  color:#fff; border-radius:26px; padding:18px 20px;
  box-shadow:0 12px 28px -14px rgba(30,43,80,.55);
}
.rst-sun{
  flex:none; display:grid; place-items:center; width:48px; height:48px;
  border-radius:16px; background:var(--yellow); color:var(--navy);
  box-shadow:0 0 0 5px rgba(255,201,60,.25);
}
.rst-header h1{
  font-family:'Fredoka',sans-serif; font-weight:700; font-size:1.42rem;
  line-height:1.1; margin:0; letter-spacing:.2px;
}
.rst-date{ margin:6px 0 0; font-weight:700; display:flex; flex-direction:column; gap:3px; }
.rst-dtop{ display:flex; align-items:center; min-width:0; }
.rst-dbot{ color:#D7DEF1; font-size:.82rem; white-space:nowrap; }
.rst-weekday{ color:var(--yellow); font-size:.95rem; }
.rst-dot{ margin:0 7px; opacity:.6; }

/* progress */
.rst-progress{ margin:18px 4px 4px; }
.rst-progress-top{
  display:flex; justify-content:space-between; align-items:baseline;
  font-weight:800; margin-bottom:9px;
}
.rst-progress-top span:first-child{ font-family:'Fredoka',sans-serif; font-size:1.05rem; }
.rst-count{ color:var(--navy-soft); font-size:.9rem; }
.rst-track{
  height:18px; background:#E9E3F0; border-radius:999px; overflow:hidden;
  box-shadow:inset 0 2px 4px rgba(30,43,80,.12);
}
.rst-fill{
  height:100%; border-radius:999px; min-width:18px;
  background:linear-gradient(90deg,var(--yellow-soft),var(--yellow));
  display:flex; align-items:center; justify-content:flex-end;
  transition:width .5s cubic-bezier(.34,1.4,.64,1);
}
.rst-fillsun{ color:var(--navy); margin-right:3px; }

/* celebration banner */
.rst-celebrate{
  display:flex; align-items:center; gap:14px; margin:18px 2px 4px;
  background:linear-gradient(135deg,var(--yellow) 0%,var(--yellow-soft) 100%);
  color:var(--navy); border-radius:24px; padding:18px 20px;
  box-shadow:0 12px 26px -14px rgba(255,160,0,.7);
}
.rst-celebrate svg{ flex:none; }
.rst-celebrate strong{ display:block; font-family:'Fredoka',sans-serif; font-size:1.3rem; }
.rst-celebrate span{ font-weight:700; }

/* sections */
.rst-section{ margin-top:24px; }
.rst-section-head{ display:flex; align-items:center; gap:10px; margin:0 4px 12px; }
.rst-section-icon{
  flex:none; display:grid; place-items:center; width:30px; height:30px;
  border-radius:10px; background:var(--navy); color:var(--yellow);
}
.rst-section-head h2{
  font-family:'Fredoka',sans-serif; font-weight:600; font-size:1.16rem; margin:0; flex:1;
}
.rst-chip{
  font-weight:800; font-size:.82rem; color:var(--navy-soft);
  background:#fff; border:2px solid var(--line); border-radius:999px; padding:3px 11px;
}
.rst-chip.full{ background:var(--green); color:#fff; border-color:var(--green); }

/* grid + cards */
.rst-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:13px; align-items:start; }

.rst-card{
  position:relative; display:flex; align-items:center; gap:15px; text-align:left;
  width:100%; padding:17px 18px; border:none; cursor:pointer; font:inherit;
  background:#fff; border-radius:24px;
  box-shadow:0 8px 20px -14px rgba(30,43,80,.4), 0 0 0 2px rgba(30,43,80,.05) inset;
  transition:transform .14s ease, box-shadow .2s ease, background .25s ease;
}
.rst-card:not(:disabled):active{ transform:scale(.97); }
.rst-card:focus-visible{ outline:3px solid var(--navy); outline-offset:3px; }
.rst-card.is-done{
  background:var(--yellow-pale);
  box-shadow:0 4px 14px -12px rgba(30,43,80,.3), 0 0 0 2px rgba(90,177,122,.35) inset;
}
.rst-card.is-done .rst-iconwrap{ background:#EAF6EE; color:var(--green); }
.rst-card.is-done .rst-name,.rst-card.is-done .rst-prompt{ color:var(--navy-soft); }
.rst-card.is-edit{ cursor:default; }

.rst-iconwrap{
  flex:none; display:grid; place-items:center; width:60px; height:60px;
  border-radius:18px; background:#EEF2FB; color:var(--navy);
  transition:background .25s ease, color .25s ease;
}
.rst-text{ display:flex; flex-direction:column; gap:3px; min-width:0; flex:1; }
.rst-name{ font-family:'Fredoka',sans-serif; font-weight:600; font-size:1.18rem; line-height:1.15; }
.rst-prompt{ font-size:.88rem; color:var(--navy-soft); font-weight:700; line-height:1.25; }

.rst-tick{
  flex:none; width:32px; height:32px; border-radius:50%;
  border:3px solid #D9DEEC; display:grid; place-items:center; color:#fff;
  transition:background .2s ease, border-color .2s ease;
}
.rst-tick.on{ background:var(--green); border-color:var(--green); }

/* parent card with breakdown */
.rst-parent{ flex-direction:column; align-items:stretch; gap:13px; }
.rst-parent:active{ transform:none; }
.rst-parent-head{ display:flex; align-items:center; gap:15px; }
.rst-tick.auto{ border-style:dashed; }
.rst-sub{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px; }
.rst-subitem{
  width:100%; box-sizing:border-box; display:flex; align-items:center; gap:12px;
  padding:12px 14px; border-radius:15px; cursor:pointer; font:inherit; font-weight:700;
  text-align:left; color:var(--navy); background:#EEF2FB; border:2px solid transparent;
  transition:background .2s ease, transform .12s ease;
}
.rst-subitem:active{ transform:scale(.98); }
.rst-subitem:focus-visible{ outline:3px solid var(--navy); outline-offset:2px; }
.rst-subitem.is-done{ background:#EAF6EE; color:var(--navy-soft); }
.rst-subtick{
  flex:none; width:26px; height:26px; border-radius:50%; border:3px solid #CCD4E6;
  display:grid; place-items:center; color:#fff; background:#fff;
  transition:background .2s ease, border-color .2s ease;
}
.rst-subtick.on{ background:var(--green); border-color:var(--green); }
.rst-subname{ flex:1; font-size:1rem; }

.rst-remove{
  position:absolute; top:-8px; right:-8px; z-index:2;
  width:34px; height:34px; border-radius:50%; cursor:pointer;
  background:#fff; color:#E26D6D; display:grid; place-items:center;
  box-shadow:0 4px 12px -4px rgba(0,0,0,.3), 0 0 0 2px #FBE0E0 inset;
}

/* add + form */
.rst-add{ grid-column:1/-1; }
.rst-addbtn{
  width:100%; padding:18px; border-radius:24px; cursor:pointer; font:inherit;
  font-family:'Fredoka',sans-serif; font-weight:600; font-size:1.05rem;
  color:var(--navy); background:#fff; border:3px dashed #C9D2EA;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.rst-addbtn:active{ transform:scale(.98); }
.rst-form{
  background:#fff; border-radius:24px; padding:16px; display:flex; flex-direction:column; gap:11px;
  box-shadow:0 8px 20px -14px rgba(30,43,80,.4);
}
.rst-input{
  width:100%; box-sizing:border-box; padding:13px 15px; font:inherit; font-weight:700;
  border:2px solid var(--line); border-radius:15px; color:var(--navy); background:var(--cream);
}
.rst-input:focus{ outline:none; border-color:var(--navy); background:#fff; }
.rst-input::placeholder{ color:#A7AFC4; }
.rst-iconpick{ display:grid; grid-template-columns:repeat(6,1fr); gap:8px; }
@media(min-width:560px){ .rst-iconpick{ grid-template-columns:repeat(8,1fr); } }
.rst-iconopt{
  aspect-ratio:1; display:grid; place-items:center; cursor:pointer;
  border-radius:13px; border:2px solid var(--line); background:var(--cream); color:var(--navy);
}
.rst-iconopt.sel{ border-color:var(--navy); background:var(--yellow-pale); color:var(--navy); }
.rst-formrow{ display:flex; gap:10px; }
.rst-ghost,.rst-primary{
  flex:1; padding:13px; border-radius:15px; cursor:pointer; font:inherit; font-weight:800;
  display:flex; align-items:center; justify-content:center; gap:7px; border:none;
}
.rst-ghost{ background:var(--cream); color:var(--navy-soft); }
.rst-primary{ background:var(--navy); color:#fff; }
.rst-primary:disabled{ opacity:.45; cursor:not-allowed; }

/* empty */
.rst-empty{
  margin-top:20px; padding:34px 24px; text-align:center; color:var(--navy-soft);
  background:#fff; border-radius:24px; border:3px dashed #D8DEEC;
}
.rst-empty p{ margin:12px 0 0; font-weight:700; }

/* footer */
.rst-footer{ display:flex; gap:12px; margin-top:22px; }
.rst-action{
  flex:1; padding:15px; border-radius:18px; cursor:pointer; font:inherit; font-weight:800;
  display:flex; align-items:center; justify-content:center; gap:8px;
  background:#fff; color:var(--navy); border:2px solid var(--line);
  transition:transform .12s ease;
}
.rst-action:active{ transform:scale(.97); }
.rst-action.active{ background:var(--navy); color:#fff; border-color:var(--navy); }
.rst-action.warn{ background:#FFE3E3; color:#C0392B; border-color:#F4C2C2; }

/* confetti */
.rst-confetti{ position:fixed; inset:0; pointer-events:none; z-index:50; overflow:hidden; }
.rst-confetti span{
  position:absolute; top:-24px; display:block;
  animation-name:rst-fall; animation-timing-function:linear; animation-fill-mode:forwards;
}
@keyframes rst-fall{
  0%{ transform:translateY(-24px) rotate(0deg); opacity:1; }
  100%{ transform:translateY(108vh) rotate(680deg); opacity:.85; }
}
.pop{ animation:rst-pop .45s cubic-bezier(.34,1.5,.6,1) both; }
@keyframes rst-pop{ 0%{ transform:scale(.7); opacity:0; } 60%{ transform:scale(1.05); } 100%{ transform:scale(1); opacity:1; } }
.badgePop{ animation:rst-badge .4s cubic-bezier(.34,1.6,.6,1) both; }
@keyframes rst-badge{ 0%{ transform:scale(0); } 70%{ transform:scale(1.3); } 100%{ transform:scale(1); } }

@media(prefers-reduced-motion:reduce){
  .rst-card,.rst-action,.rst-fill{ transition:none; }
  .pop,.badgePop{ animation:none; }
}

/* expandable card (homework: tap when empty, auto-tick when tasks added) */
.rst-parent-head.as-button{ width:100%; border:none; background:none; font:inherit; color:inherit; cursor:pointer; padding:0; text-align:left; }
.rst-parent-head.as-button:active{ transform:scale(.99); }
.rst-subx{ flex:none; display:grid; place-items:center; width:26px; height:26px; border-radius:50%; color:#C0788A; background:rgba(30,43,80,.06); margin-left:2px; }
.rst-subadd{ width:100%; padding:11px; border-radius:14px; cursor:pointer; font:inherit; font-weight:800; color:var(--navy-soft); background:#fff; border:2px dashed #C9D2EA; display:flex; align-items:center; justify-content:center; gap:7px; }
.rst-subadd:active{ transform:scale(.99); }
.rst-subform{ display:flex; gap:8px; align-items:stretch; }
.rst-subform .rst-input{ flex:1; min-width:0; }
.rst-subbtn{ flex:none; width:auto; padding:0 14px; }

/* desktop / mouse refinements */
.rst-footer{ max-width:520px; margin-left:auto; margin-right:auto; }
@media (hover:hover){
  button.rst-card:not(.is-edit):hover{ transform:translateY(-2px); box-shadow:0 16px 28px -16px rgba(30,43,80,.55), 0 0 0 2px rgba(30,43,80,.10) inset; }
  .rst-parent-head.as-button:hover{ opacity:.9; }
  .rst-subitem:hover{ background:#E4EAF7; }
  .rst-subitem.is-done:hover{ background:#E0F1E7; }
  .rst-subx:hover{ background:rgba(30,43,80,.13); color:#B5485F; }
  .rst-action:hover{ border-color:#C4CCE0; background:#FBFCFE; }
  .rst-action.active:hover{ background:#26365F; }
  .rst-action.warn:hover{ background:#FFD9D9; }
  .rst-addbtn:hover, .rst-subadd:hover{ border-color:#9DB0DE; color:var(--navy); }
  .rst-iconopt:hover{ border-color:#9DB0DE; }
  .rst-primary:hover:not(:disabled){ background:#26365F; }
  .rst-ghost:hover{ background:#EFEBE1; }
  .rst-remove:hover{ background:#FFF3F3; color:#D64545; }
}

/* header: "Tomorrow" tag + today's calendar */
.rst-head-main{ flex:1; min-width:0; }
.rst-tag{ display:inline-block; background:var(--yellow); color:var(--navy); font-weight:800; font-size:.62rem; letter-spacing:.05em; text-transform:uppercase; padding:2px 8px; border-radius:999px; margin-right:8px; vertical-align:middle; }
.rst-today{ flex:none; display:flex; flex-direction:column; align-items:center; gap:4px; }
.rst-today-cap{ font-size:.6rem; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:var(--yellow); }
.rst-cal{ width:54px; border-radius:13px; overflow:hidden; background:#fff; display:flex; flex-direction:column; text-align:center; box-shadow:0 6px 14px -8px rgba(0,0,0,.45); }
.rst-cal-top{ background:var(--yellow); color:var(--navy); font-family:'Fredoka',sans-serif; font-weight:700; font-size:.6rem; letter-spacing:.12em; padding:3px 0 2px; }
.rst-cal-num{ color:var(--navy); font-family:'Fredoka',sans-serif; font-weight:700; font-size:1.55rem; line-height:1.05; padding-top:3px; }
.rst-cal-dow{ color:var(--navy-soft); font-size:.58rem; font-weight:800; letter-spacing:.06em; text-transform:uppercase; padding:0 0 5px; }

/* read-aloud speaker + sound toggle */
.rst-speak{ flex:none; display:grid; place-items:center; width:34px; height:34px; border-radius:50%; color:var(--navy-soft); background:rgba(30,43,80,.06); cursor:pointer; transition:background .2s ease, color .2s ease; }
.rst-card.is-done .rst-speak{ background:rgba(30,43,80,.05); }
.rst-icononly{ flex:none; width:54px; padding-left:0; padding-right:0; }
@media (hover:hover){ .rst-speak:hover{ background:rgba(30,43,80,.13); color:var(--navy); } }

/* read-aloud speaker stacked under the item icon */
.rst-iconcol{ flex:none; display:flex; flex-direction:column; align-items:center; gap:7px; }

/* profile switcher */
.rst-profiles{ display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin:0 2px 14px; }
.rst-pchip{ display:inline-flex; align-items:center; gap:7px; padding:8px 14px; border-radius:999px; font:inherit; font-weight:800; font-size:.95rem; background:#fff; border:2px solid var(--line); color:var(--navy); cursor:pointer; }
.rst-pchip.on{ color:#fff; }
.rst-pchip-dot{ width:10px; height:10px; border-radius:50%; flex:none; }
.rst-pchip.on .rst-pchip-dot{ background:#fff !important; }
.rst-pchip-edit{ display:inline-grid; place-items:center; margin-left:2px; opacity:.9; }
.rst-pchip-add{ width:42px; padding:8px 0; justify-content:center; color:var(--navy-soft); border-style:dashed; border-color:#C9D2EA; }
.rst-profpanel{ background:#fff; border-radius:22px; padding:16px; margin:0 2px 14px; display:flex; flex-direction:column; gap:11px; box-shadow:0 8px 20px -14px rgba(30,43,80,.4); }
.rst-profpanel-title{ font-family:'Fredoka',sans-serif; font-weight:600; font-size:1.05rem; color:var(--navy); }
.rst-swatches{ display:flex; flex-wrap:wrap; gap:10px; }
.rst-swatch{ width:38px; height:38px; border-radius:50%; border:3px solid #fff; box-shadow:0 0 0 2px var(--line); cursor:pointer; padding:0; }
.rst-swatch.sel{ box-shadow:0 0 0 3px var(--navy); }
.rst-profdel{ align-self:flex-start; display:inline-flex; align-items:center; gap:6px; padding:9px 13px; border-radius:13px; border:2px solid #F4C2C2; background:#FFF3F3; color:#C0392B; font:inherit; font-weight:800; cursor:pointer; }
.rst-profdel.warn{ background:#FFE3E3; }
@media (hover:hover){ .rst-pchip:hover{ filter:brightness(0.97); } .rst-swatch:hover{ transform:scale(1.06); } }

/* primary level selector */
.rst-proflabel{ font-weight:800; font-size:.78rem; color:var(--navy-soft); text-transform:uppercase; letter-spacing:.04em; margin-top:2px; }
.rst-levels{ display:flex; gap:8px; flex-wrap:wrap; }
.rst-level{ flex:1; min-width:44px; padding:10px 0; border-radius:13px; border:2px solid var(--line); background:var(--cream); color:var(--navy); font:inherit; font-weight:800; cursor:pointer; }
.rst-level.sel{ background:var(--navy); color:#fff; border-color:var(--navy); }
@media (hover:hover){ .rst-level:hover{ border-color:#9DB0DE; } }

*{box-sizing:border-box}
html,body{margin:0;padding:0}

/* edit mode: usual vs just-for-today tabs + skip control */
.rst-tabs{ display:flex; gap:8px; margin:0 2px 8px; }
.rst-tab{ flex:1; padding:11px; border-radius:14px; border:2px solid var(--line); background:#fff; color:var(--navy-soft); font:inherit; font-weight:800; cursor:pointer; }
.rst-tab.on{ background:var(--navy); color:#fff; border-color:var(--navy); }
.rst-edithint{ margin:0 4px 14px; font-size:.82rem; font-weight:700; color:var(--navy-soft); }
.rst-skip{ position:absolute; top:-8px; right:-8px; z-index:2; width:34px; height:34px; border-radius:50%; cursor:pointer; background:#fff; color:#7a8398; display:grid; place-items:center; box-shadow:0 4px 12px -4px rgba(0,0,0,.3), 0 0 0 2px #E7E0D2 inset; }
.rst-skip.on{ color:#2F8F5B; box-shadow:0 4px 12px -4px rgba(0,0,0,.3), 0 0 0 2px #BFE6CD inset; }
.rst-card.is-skipped{ opacity:.5; }
@media (hover:hover){ .rst-tab:hover{ border-color:#9DB0DE; } .rst-skip:hover{ color:var(--navy); } }

/* per-item remove-scope prompt + wrapping add row */
.rst-formrow{ flex-wrap:wrap; }
.rst-askremove{ align-items:flex-start; }
.rst-askrow{ display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
.rst-askbtn{ padding:9px 12px; border-radius:12px; border:2px solid var(--line); background:var(--cream); color:var(--navy); font:inherit; font-weight:800; font-size:.85rem; cursor:pointer; }
.rst-askbtn.warn{ background:#FFE3E3; border-color:#F4C2C2; color:#C0392B; }
.rst-askbtn.ghost{ background:#fff; color:var(--navy-soft); }
@media (hover:hover){ .rst-askbtn:hover{ filter:brightness(0.97); } }

.rst-subedit{ cursor:default; }

/* hold-to-confirm */
.rst-hold{ position:relative; overflow:hidden; }
.rst-holdfill{ position:absolute; inset:0 auto 0 0; width:0; background:rgba(0,0,0,.16); transition:width .2s ease; z-index:0; pointer-events:none; }
.rst-hold.holding .rst-holdfill{ width:100%; transition:width 1.2s linear; }
.rst-holdlabel{ position:relative; z-index:1; display:inline-flex; align-items:center; justify-content:center; gap:6px; }

/* help button + sheet */
.rst-help{ margin-left:auto; display:inline-flex; align-items:center; gap:6px; padding:8px 13px; border-radius:999px; border:2px solid var(--line); background:#fff; color:var(--navy-soft); font:inherit; font-weight:800; font-size:.9rem; cursor:pointer; }
.rst-overlay{ position:fixed; inset:0; background:rgba(30,43,80,.5); z-index:60; display:flex; align-items:flex-end; justify-content:center; }
.rst-sheet{ background:#fff; width:100%; max-width:560px; max-height:88vh; overflow:auto; border-radius:24px 24px 0 0; padding:18px 18px 26px; }
.rst-sheet-head{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; position:sticky; top:0; background:#fff; }
.rst-sheet-head h2{ font-family:'Fredoka',sans-serif; font-weight:700; font-size:1.3rem; margin:0; color:var(--navy); }
.rst-sheet-x{ flex:none; width:38px; height:38px; border-radius:50%; border:none; background:var(--cream); color:var(--navy); display:grid; place-items:center; cursor:pointer; }
.rst-help-item{ padding:11px 2px; border-top:1px solid var(--line); display:flex; flex-direction:column; gap:3px; }
.rst-help-item:first-child{ border-top:none; }
.rst-help-item b{ font-family:'Fredoka',sans-serif; font-weight:600; color:var(--navy); font-size:1.02rem; }
.rst-help-item span{ color:var(--navy-soft); font-weight:600; font-size:.9rem; line-height:1.35; }
@media(min-width:560px){ .rst-overlay{ align-items:center; padding:16px; } .rst-sheet{ border-radius:24px; } }
@media(hover:hover){ .rst-help:hover{ border-color:#9DB0DE; color:var(--navy); } .rst-sheet-x:hover{ background:#EFE9DC; } }

/* add-to-home-screen nudge */
.rst-a2hs-steps{ margin-top:8px; font-size:.84rem; font-weight:700; color:var(--navy); line-height:1.55; }
.rst-a2hs-steps b{ font-family:'Fredoka',sans-serif; font-weight:600; }

/* a2hs "don't show again" (30-day snooze) */

.rst-holdhint{ font-style:normal; font-weight:800; font-size:.66rem; opacity:.7; text-transform:uppercase; letter-spacing:.06em; margin-left:6px; }

/* empty Bring prompt (Sat/Sun/holiday) */
.rst-bring-empty{ display:flex; align-items:center; gap:12px; padding:16px; border:2px dashed #D9D2C4; border-radius:18px; color:var(--navy-soft); font-weight:700; font-size:.92rem; line-height:1.35; background:rgba(255,255,255,.5); }
.rst-bring-empty svg{ flex:none; color:#B9C0D4; }




/* HBL button — sits to the left of the School Day / Holiday switch; subtle when off */
.rst-hbl{ margin-right:auto; display:inline-flex; align-items:center; gap:5px; padding:6px 11px; border-radius:999px; border:2px solid var(--line); background:#fff; color:var(--navy-soft); font:inherit; font-weight:800; font-size:.74rem; letter-spacing:.03em; cursor:pointer; transition:all .2s ease; }
.rst-hbl.on{ background:var(--navy); border-color:var(--navy); color:#fff; }
@media(hover:hover){ .rst-hbl:hover{ border-color:#9DB0DE; color:var(--navy); } .rst-hbl.on:hover{ background:var(--navy-2); color:#fff; } }

/* School / Holiday switch — sits above the progress bar */
/* Fixed row height so the switch sits identically whether or not the HBL button
   is present (holiday mode hides it), keeping the 18px gaps visually equal. */
.rst-holbar{ display:flex; align-items:center; justify-content:flex-end; gap:10px; margin:18px 4px 0; min-height:34px; }
.rst-hname{ display:block; }
/* Equal 18px gap above and below the switch, whatever follows it
   (progress bar normally, celebration block when everything is done). */
.rst-holbar + *{ margin-top:18px !important; }
.rst-holbar-lab{ font-size:.8rem; font-weight:800; color:var(--navy-soft); letter-spacing:.02em; }
.rst-switch{ flex:none; width:46px; height:27px; border-radius:999px; border:none; padding:0; background:#D9DEEC; position:relative; cursor:pointer; transition:background .22s ease; }
.rst-switch.on{ background:#E9A82A; }
.rst-knob{ position:absolute; top:2px; left:2px; width:23px; height:23px; border-radius:50%; background:#fff; box-shadow:0 2px 5px rgba(0,0,0,.25); transition:transform .22s cubic-bezier(.3,.8,.4,1); }
.rst-switch.on .rst-knob{ transform:translateX(19px); }

/* centred modal dialogs (name prompt, add-to-home-screen) */
.rst-modal{ position:relative; background:#fff; width:100%; max-width:420px; border-radius:24px; padding:24px 20px 20px; box-shadow:0 24px 60px -20px rgba(30,43,80,.5); display:flex; flex-direction:column; gap:12px; }
.rst-modal h2{ font-family:'Fredoka',sans-serif; font-weight:700; font-size:1.35rem; color:var(--navy); margin:0; padding-right:32px; }
.rst-modal p{ margin:0; font-size:.92rem; font-weight:700; color:var(--navy-soft); line-height:1.45; }
.rst-modal-btns{ display:flex; gap:10px; margin-top:4px; }
.rst-modal-btns > *{ flex:1; justify-content:center; }
.rst-modal-x{ position:absolute; top:14px; right:14px; width:34px; height:34px; border-radius:50%; border:none; background:var(--cream); color:var(--navy); display:grid; place-items:center; cursor:pointer; }
.rst-overlay{ padding:16px; align-items:center; }
@media(hover:hover){ .rst-modal-x:hover{ background:#EFE9DC; } }

/* "Don't show me again" under the Add to Home Screen button */
.rst-a2hs-never{ align-self:center; background:none; border:none; color:var(--navy-soft); font:inherit; font-weight:800; font-size:.82rem; text-decoration:underline; cursor:pointer; padding:2px; margin-top:2px; }
.rst-a2hs-note{ font-size:.8rem !important; opacity:.85; }

/* P1-P6 always on one line (no wrapping, even on narrow phones) */
.rst-levels-row{ flex-wrap:nowrap; gap:6px; }
.rst-levels-row .rst-level{ flex:1 1 0; min-width:0; padding:10px 0; font-size:.9rem; }

/* version marker in the Help sheet (so you can confirm which build is running) */
.rst-version{ margin-top:14px; padding-top:12px; border-top:1px solid var(--line); text-align:center; font-size:.78rem; font-weight:800; color:#9AA3B8; letter-spacing:.03em; }

/* date pill in front of each homework item (DD/MMM, when it was set) */
.rst-datepill{ flex:none; padding:3px 7px; border-radius:8px; background:#E7ECF7; color:var(--navy-soft); font-size:.68rem; font-weight:800; letter-spacing:.02em; white-space:nowrap; }
.rst-subitem.is-done .rst-datepill{ opacity:.55; }

/* scope buttons under the pencil-case add field */
.rst-addscope{ display:flex; gap:8px; margin-top:8px; }
.rst-addscope .rst-primary{ flex:1; justify-content:center; font-size:.85rem; padding:10px 8px; }

/* daily reminder prompt */
.rst-calpreview{ display:flex; align-items:center; gap:9px; padding:11px 13px; border-radius:14px; background:var(--cream); border:2px solid var(--line); font-size:.85rem; font-weight:800; color:var(--navy); line-height:1.3; }
.rst-calpreview svg{ flex:none; color:var(--navy-soft); }
input.rst-input[type="time"]{ font-family:'Nunito',sans-serif; font-weight:800; }

/* "Add to Calendar" fits one line; note under the reminder preview */
.rst-calbtn{ white-space:nowrap; font-size:.88rem; padding-left:10px; padding-right:10px; }
.rst-calnote{ font-size:.82rem !important; opacity:.85; margin-top:-2px !important; }
</style>
</head>

const CAL_DEFAULT='20:00';

function buildICS(name, hhmm){
  const [hh,mm]=(hhmm||CAL_DEFAULT).split(':').map(n=>parseInt(n,10));
  const now=new Date();
  const d=new Date(now.getTime()+8*3600000); // today in SGT
  const y=d.getUTCFullYear(), mo=d.getUTCMonth()+1, da=d.getUTCDate();
  const start=`${y}${pad2(mo)}${pad2(da)}T${pad2(hh)}${pad2(mm)}00`;
  const stamp=now.toISOString().replace(/[-:]/g,'').split('.')[0]+'Z';
  const uid='rft-'+Math.random().toString(36).slice(2)+'@readyfortomorrow';
  const title=`${name}: Reminder to get ready for tomorrow`;
  return [
    'BEGIN:VCALENDAR','VERSION:2.0','PRODID:-//Ready for Tomorrow//EN','CALSCALE:GREGORIAN',
    'BEGIN:VEVENT','UID:'+uid,'DTSTAMP:'+stamp,'DTSTART:'+start,'DURATION:PT15M',
    'RRULE:FREQ=DAILY','SUMMARY:'+icsEsc(title),
    'DESCRIPTION:'+icsEsc('Open Ready for Tomorrow and pack together.'),
    'BEGIN:VALARM','TRIGGER:PT0M','ACTION:DISPLAY','DESCRIPTION:'+icsEsc(title),'END:VALARM',
    'END:VEVENT','END:VCALENDAR'

   document, which Safari hands straight to the Calendar app's "Add Event" screen.
   Either way the parent reviews it — and can change the time — in the calendar app. */
function gcalURL(name, hhmm){
  const [hh,mm]=(hhmm||CAL_DEFAULT).split(':').map(n=>parseInt(n,10));
  const d=new Date(Date.now()+8*3600000);
  const y=d.getUTCFullYear(), mo=d.getUTCMonth()+1, da=d.getUTCDate();
  const st=`${y}${pad2(mo)}${pad2(da)}T${pad2(hh)}${pad2(mm)}00`;
  const endH=(hh*60+mm+15), eh=Math.floor(endH/60)%24, em=endH%60;
  const en=`${y}${pad2(mo)}${pad2(da)}T${pad2(eh)}${pad2(em)}00`;
  const q=new URLSearchParams({
    action:'TEMPLATE',
    text:`${name}: Reminder to get ready for tomorrow`,
    dates:`${st}/${en}`,

const HOLIDAY_TTL = 7*24*3600*1000; // re-check at most weekly

/* ---------- MOE school calendar (computed; no annual maintenance) ----------
   Anchor: if 2 Jan falls Mon/Tue it is in Week 1; if Wed/Thu/Fri those days are
   "Week 0" and Week 1 starts the following Monday; if Sat/Sun, school starts the
   next Monday (= Week 1). Everything else cascades from that Week-1 Monday (M1).  */
const APP_VERSION='1.9';
const DAY=86400000;
function addDays(d,n){ return new Date(d.getTime()+n*DAY); }
function week1Monday(year){
  const jan2=new Date(Date.UTC(year,0,2)); const dow=jan2.getUTCDay(); // 0 Sun .. 6 Sat
  if(dow===1) return jan2;                     // Mon 2 Jan -> Week 1 starts 2 Jan
  if(dow===2) return addDays(jan2,-1);         // Tue 2 Jan -> that week is Week 1 (Mon = 1 Jan)
  if(dow>=3 && dow<=5) return addDays(jan2, 8-dow); // Wed/Thu/Fri -> Week 0; next Monday
  if(dow===6) return addDays(jan2,2);          // Sat -> Mon 4 Jan
  return addDays(jan2,1);                      // Sun -> Mon 3 Jan
}
/* School year structure from M1: T1 10w, Mar break 1w, T2 10w, Jun break 4w,
   T3 10w, Sep break 1w, T4 10w, then year-end break to 31 Dec. */
function schoolYear(year){
  const M1=week1Monday(year);
  // First school day: 2 Jan, or the next weekday if 2 Jan is a weekend. In Week-0
  // years this precedes M1; in Mon/Tue years it is on/after M1.
  const jan2=new Date(Date.UTC(year,0,2)); const j2d=jan2.getUTCDay();
  const t1Start = j2d===6 ? addDays(jan2,2) : (j2d===0 ? addDays(jan2,1) : jan2);
  const hasWeek0 = t1Start.getTime() < M1.getTime();
  const t1End = addDays(M1, 10*7-3);   // Fri of week 10
  const t2Start= addDays(M1, 11*7);
  const t2End  = addDays(M1, 21*7-3);
  const t3Start= addDays(M1, 25*7);
  const t3End  = addDays(M1, 35*7-3);  // Fri of T3 week 10  (Teachers' Day)
  const t4Start= addDays(M1, 36*7);
  const t4End  = addDays(M1, 45*7+4);  // last school day (Friday) — holds for every year checked
  const youth  = addDays(M1, 26*7);    // Monday of T3 week 2
  return {M1,t1Start,t1End,t2Start,t2End,t3Start,t3End,t4Start,t4End,youth,hasWeek0};
}
/* First school day of the year: 2 Jan, or the next non-weekend, non-public-holiday
   day (e.g. 2023: 1 Jan was a Sunday, so Mon 2 Jan was the New Year holiday in lieu
   and school opened Tue 3 Jan). P1 reports on this day. */
function firstSchoolDay(year){
  const ph=holidaySet();
  let d=new Date(Date.UTC(year,0,2));
  for(let i=0;i<10;i++){
    const dow=d.getUTCDay();
    if(dow!==0 && dow!==6 && !ph[dateKey(d)]) return d;
    d=addDays(d,1);
  }
  return d;
}
/* The next school day after d (skips weekends and public holidays). */
function nextSchoolDay(d){
  const ph=holidaySet();
  let n=addDays(d,1);
  for(let i=0;i<10;i++){
    const dow=n.getUTCDay();
    if(dow!==0 && dow!==6 && !ph[dateKey(n)]) return n;
    n=addDays(n,1);
  }
  return n;
}
/* Staggered start: P1 on the first school day; P2-P6 on the next school day.
   So if 2 Jan is a Friday, P1 goes Fri 2 Jan and the rest start Mon 5 Jan. */
function levelStartDay(year, lvl){
  const first=firstSchoolDay(year);
  return (lvl && lvl>=2) ? nextSchoolDay(first) : first;

function firstFriday(year,month){

  return addDays(d, (5 - d.getUTCDay() + 7) % 7);

/* Scheduled single-day school holidays (school-only; public holidays come from the feed). */
function schoolSingleDays(year, phSet){
  const sy=schoolYear(year), out={};
  out[dateKey(sy.youth)]='Youth Day (school holiday)';
  out[dateKey(sy.t3End)]="Teachers' Day (school holiday)";
  out[dateKey(firstFriday(year,10))]="Children's Day (school holiday)";
  // Day after National Day: Mon-Thu -> 10 Aug; Sat -> 11 Aug (Mon); Fri/Sun -> none.
  const nd=new Date(Date.UTC(year,7,9)), ndow=nd.getUTCDay();
  let ndKey=null;

  else if(ndow===6) ndKey=dateKey(new Date(Date.UTC(year,7,11)));

/* Is this date inside a school vacation? Level-aware: before a child's own start

function inSchoolBreak(d, lvl){
  const y=d.getUTCFullYear(), sy=schoolYear(y), t=d.getTime();
  const start=levelStartDay(y, lvl||1);
  if(t < start.getTime()) return true;                                        // before this child's first day
  if(t > sy.t1End.getTime() && t < sy.t2Start.getTime()) return true;         // March break
  if(t > sy.t2End.getTime() && t < sy.t3Start.getTime()) return true;         // June break
  if(t > sy.t3End.getTime() && t < sy.t4Start.getTime()) return true;         // September break
  if(t > sy.t4End.getTime()) return true;                                     // year-end to 31 Dec
  return false;
}
/* Overrides the parent sets: 'school' | 'hbl' | 'holiday' for a given date. */
function overrides(){ try{ const r=lsGet('rst:ovr'); return r?JSON.parse(r):{}; }catch(e){ return {}; } }

function autoDayType(d, lvl){
  const k=dateKey(d), dow=d.getUTCDay();

  return inSchoolBreak(d, lvl) ? 'holiday' : 'school';

/* The effective day type, with the parent's override winning. */
function dayType(d, lvl){

  // so it is only ever a modifier on a school day (never on a holiday).

async function refreshHolidays(){

  // Year-agnostic source: any future year works with no maintenance, ever.

      const r=await fetch('https://date.nager.at/api/v3/PublicHolidays/'+yr+'/SG',{signal:c.signal});

      if(r.ok){ const a=await r.json(); a.forEach(h=>{ if(h&&h.date) dates[h.date]=h.localName||h.name||'Public holiday'; }); got.add(yr); }
    }catch(e){}

}

  // Offer the daily reminder once to existing users too: a real (named) profile
  // that has never been shown the reminder prompt gets it on this open.
  if(!state.nameAsk && cp && !calGet(cp.id)){
    state.calAsk=cp.id; state.calTime=CAL_DEFAULT;
  }
  // If they skipped the reminder and have been away a week or more, offer it again.
  else if(!state.nameAsk && shouldRenudge()){
    state.calAsk=state.current; state.calTime=(calGet(state.current)||{}).time||CAL_DEFAULT;
  }
  lsSet('rst:lastseen', dateKey(sgToday()));   // remember this visit
  loadProfileData();
}

function loadProfileData(){
  const id=state.current, key = dateKey(tomorrow());
  let list = null;
  const raw = lsGet(pkey(id,'items'));
  if(raw){ try{ list = JSON.parse(raw); }catch(e){} }
  if(!Array.isArray(list) || !list.length){ list = JSON.parse(JSON.stringify(DEFAULT_ITEMS)); lsSet(pkey(id,'items'), JSON.stringify(list.map(stripForSave))); }
  state.template = list;
  let checked = {}, sub = {}, adds = [], skips = [], padds = {};
  const rawP = lsGet(pkey(id,'progress'));
  if(rawP){ try{
    const p=JSON.parse(rawP);
    if(p.date===key){ checked=p.checked||{}; sub=p.sub||{}; adds=p.adds||[]; skips=p.skips||[]; padds=p.padds||{}; }
    else {
      // New planning day: overlay (adds/skips) and checks reset. Unchecked homework
      // rolls forward to the next day, whatever kind of day it is — work set by school
      // is still due even if tomorrow is a weekend or a holiday. Anything still
      // unfinished two weeks after it was set is dropped quietly, so the list can't
      // silently turn into a graveyard.
      const pc=p.checked||{}, ps=p.sub||{};
      const cutoff = sgToday().getTime() - 14*DAY;
      Object.keys(ps).forEach(itId=>{
        const carried=(ps[itId]||[]).filter(c=>{
          if(pc[c.id]) return false;                       // already done
          const t = c.set ? Date.parse(c.set+'T00:00:00Z') : NaN;
          if(!isNaN(t) && t < cutoff) return false;         // older than two weeks
          return true;
        });
        if(carried.length) sub[itId]=carried.map(c=>({id:c.id, name:c.name, set:c.set}));
      });
    }
  }catch(e){} }
  state.checked=checked; state.sub=sub; state.adds=adds; state.skips=skips; state.padds=padds;
  rebuild();
  const dW=tomorrow(), tD=dW.getUTCDay(), noSch=noSchoolTomorrow(), bkt=bringBucket();
  const lvlG=effLevel(curProfile());
  const secVis = sid => { const s=SECTIONS.find(x=>x.id===sid); if(s && s.days && s.days.indexOf(tD)<0) return false; if(sid==='uniform') return !noSch; return true; };
  const act=state.items.filter(it=> secVis(it.section) && itemApplies(it,tD,bkt) && levelOk(it,lvlG) && vacationOk(it,dW,lvlG));
  const t=countLeaves(act); prevAll = t>0 && countDoneLeaves(act)===t;
}

/* build a display item from a template/added item, filling done from checked/sub */
function hydrate(it){
  if(it.expandable){
    const kids=(state.sub[it.id]||[]).map(c=>({id:c.id, name:c.name, set:c.set, done: !!state.checked[c.id]}));
    return {...it, done: !!state.checked[it.id], children: kids};
  }
  if(Array.isArray(it.children)){
    const extra=(state.padds&&state.padds[it.id])||[];
    const kids=[...it.children, ...extra];
    return {...it, children: kids.map(c=>({...c, done: !!state.checked[c.id]}))};
  }
  return {...it, done: !!state.checked[it.id]};
}
/* display list = template (minus today's skips) + today's temporary adds */
function rebuild(){
  const sk=new Set(state.skips||[]);
  const out=[];
  (state.template||[]).forEach(t=>{ if(!sk.has(t.id)) out.push(hydrate(t)); });
  (state.adds||[]).forEach(a=> out.push(hydrate(a)));
  state.items=out;
}

function persist(){
  const id=state.current;
  lsSet(pkey(id,'items'), JSON.stringify((state.template||[]).map(stripForSave)));
  lsSet(pkey(id,'progress'), JSON.stringify({
    date: dateKey(tomorrow()),
    checked: state.checked||{},
    sub: state.sub||{},
    adds: (state.adds||[]).map(stripForSave),
    skips: state.skips||[],
    padds: state.padds||{}
  }));
}

function removeBtn(it){
  return `<span class="rst-remove" role="button" tabindex="0" data-act="remove" data-id="${esc(it.id)}" aria-label="Remove ${esc(it.name)}">${svg('trash2',18,2.4)}</span>`;
}
function iconCol(it){
  return `<span class="rst-iconwrap">${svg(it.icon,34,2.2)}</span>`;
}
/* Edit controls: added items -> remove; skipped defaults -> add back;
   uniform default -> skip only (this time); bring/do default -> ask scope. */
function editControl(it){
  const isAdd = state._addIds && state._addIds.has(it.id);
  const isSkip = state._skipSet && state._skipSet.has(it.id);
  if(isAdd) return `<span class="rst-remove" role="button" tabindex="0" data-act="removeadd" data-id="${esc(it.id)}" aria-label="Remove ${esc(it.name)}">${svg('trash2',18,2.4)}</span>`;
  if(isSkip) return `<span class="rst-skip on" role="button" tabindex="0" data-act="unskip" data-id="${esc(it.id)}" aria-label="Add ${esc(it.name)} back">${svg('plus',15,2.8)}</span>`;
  if(it.section==='uniform') return `<span class="rst-skip" role="button" tabindex="0" data-act="skiponly" data-id="${esc(it.id)}" aria-label="Skip ${esc(it.name)} this time">${svg('x',15,2.7)}</span>`;
  return `<span class="rst-remove" role="button" tabindex="0" data-act="rmask" data-id="${esc(it.id)}" aria-label="Remove ${esc(it.name)}">${svg('trash2',18,2.4)}</span>`;
}

function render(){
  const pop = state.pop; state.pop = null;
  const dT = tomorrow();
  const tDay = dT.getUTCDay();
  const wkend = (tDay===0 || tDay===6);
  const prof = curProfile();
  const profLvl = effLevel(prof)||1;
  const dtype = dayType(dT, profLvl);              // 'school' | 'holiday'
  const isHBL = isHBLDay(dT, profLvl);            // school day done from home
  const noSchool = dtype==='holiday';
  const holTomorrow = noSchool && !wkend;
  const offReason = noSchool ? noSchoolReason(dT, profLvl) : '';
  const isToday = dateKey(dT)===dateKey(sgToday());
  const whenWord = isToday ? 'Today' : 'Tomorrow';
  const pName = prof ? prof.name : '';
  const pal = paletteOf(prof ? prof.color : 'navy');
  const nm = pName ? `<span class="rst-hname">${esc(pName)},</span>` : '';
  const lead = isHBL ? 'Ready for HBL'
    : wkend ? 'Ready for the Weekends'
    : noSchool ? 'Ready for the Holidays'
    : (pName ? 'Ready for School' : 'Ready for School '+whenWord);
  const headerTitle = nm ? (nm + lead) : lead;
  const curBucket = bringBucket();
  const applies = it => itemApplies(it, tDay, curBucket);
  const lvl = effLevel(prof);
  const visibleSections = SECTIONS.filter(sec => {
    if(sec.days && sec.days.indexOf(tDay)<0) return false;
    if(sec.id==='uniform') return !noSchool && !isHBL;   // no uniform on HBL, even a Monday
    return true; // bring (own bucket per day type) and complete
  });
  const visIds = visibleSections.map(s=>s.id);
  const items = state.items.filter(it => levelOk(it, lvl) && vacationOk(it, dT, lvl));
  const activeItems = items.filter(it => visIds.indexOf(it.section)>-1 && applies(it));
  const total = countLeaves(activeItems), done = countDoneLeaves(activeItems);
  const allDone = total>0 && done===total;
  const pct = total ? Math.round(done/total*100) : 0;
  const weekday = dT.toLocaleDateString(undefined,{weekday:'long', timeZone:'UTC'});
  const longDate = dT.getUTCDate()+' '+dT.toLocaleDateString('en-GB',{month:'long',timeZone:'UTC'})+' '+dT.getUTCFullYear();
  const tdy = sgToday();
  const calMon = tdy.toLocaleDateString(undefined,{month:'short', timeZone:'UTC'}).toUpperCase();
  const calNum = tdy.getUTCDate();
  const calDow = tdy.toLocaleDateString(undefined,{weekday:'short', timeZone:'UTC'});

  let h = '';


  // profile switcher
  h += `<div class="rst-profiles">`;
  state.profiles.forEach(p=>{
    const pp=paletteOf(p.color); const active=p.id===state.current;
    h += `<button class="rst-pchip${active?' on':''}" data-act="profswitch" data-id="${esc(p.id)}" style="${active?`background:${pp.c1};border-color:${pp.c1};color:#fff`:`border-color:${pp.c1};color:${pp.c1}`}">`
       + `<span class="rst-pchip-dot" style="background:${pp.c1}"></span>${esc(p.name)}${active?` <span class="rst-pchip-edit" data-act="profedit" aria-label="Edit profile">${svg('pencil',14,2.6)}</span>`:''}</button>`;
  });
  h += `<button class="rst-pchip rst-pchip-add" data-act="profadd" aria-label="Add a child">${svg('plus',18,2.8)}</button>`;
  h += `<button class="rst-help" data-act="help" aria-label="How it works">${svg('info',18,2.6)}<span>Help</span></button>`;
  h += `</div>`;

  // profile add/edit panel
  if(state.profileEdit){
    const d=state.profileEdit;
    h += `<div class="rst-profpanel"><div class="rst-profpanel-title">${d.id?'Edit profile':'New profile'}</div>`
       + `<input class="rst-input" id="rst-profname" placeholder="Child's name" value="${esc(d.name)}" maxlength="20">`
       + `<div class="rst-proflabel">Primary level</div><div class="rst-levels">`;
    for(let n=1;n<=6;n++){ h += `<button class="rst-level${d.level===n?' sel':''}" data-act="proflevel" data-level="${n}">P${n}</button>`; }
    h += `</div><div class="rst-proflabel">Colour</div><div class="rst-swatches">`;
    PALETTE.forEach(c=>{ h += `<button class="rst-swatch${d.color===c.id?' sel':''}" data-act="profcolor" data-color="${c.id}" aria-label="${c.id}" style="background:${c.c1}"></button>`; });
    h += `</div><div class="rst-formrow">`
       + `<button class="rst-ghost" data-act="profcancel">${svg('x',18,2.6)} Cancel</button>`
       + `<button class="rst-primary" data-act="profsave" ${d.name.trim()?'':'disabled'}>${svg('check',18,2.8)} ${d.id?'Save':'Add child'}</button></div>`;
    if(d.id && state.profiles.length>1){
      h += `<button class="rst-profdel rst-hold" data-holdact="profdelete"><span class="rst-holdfill"></span><span class="rst-holdlabel">${svg('trash2',16,2.4)} Hold to delete profile</span></button>`;
    }
    h += `</div>`;
  }

  h += `<header class="rst-header" style="background:linear-gradient(135deg,${pal.c1} 0%,${pal.c2} 100%)">`
     + `<div class="rst-head-main"><h1>${headerTitle}</h1>`
     + `<p class="rst-date"><span class="rst-dtop"><span class="rst-tag">${whenWord}</span><span class="rst-weekday">${esc(weekday)}</span></span><span class="rst-dbot">${esc(longDate)}</span></p></div>`
     + `<div class="rst-today"><span class="rst-today-cap">Today</span>`
     + `<span class="rst-cal"><span class="rst-cal-top">${esc(calMon)}</span><span class="rst-cal-num">${calNum}</span><span class="rst-cal-dow">${esc(calDow)}</span></span></div>`
     + `</header>`;


  // School / Holiday switch (weekdays only) — sits above the progress bar
  if(!wkend){
    const hblBtn = !noSchool
      ? `<button class="rst-hbl${isHBL?' on':''}" data-act="hbl" aria-pressed="${isHBL}" aria-label="Home-based learning">${svg('house',13,2.6)}<span>HBL</span></button>`
      : '';
    h += `<div class="rst-holbar">${hblBtn}`
       + `<span class="rst-holbar-lab">${noSchool?'Holiday':'School Day'}</span>`
       + `<button class="rst-switch${noSchool?' on':''}" role="switch" aria-checked="${noSchool}" aria-label="Mark ${whenWord.toLowerCase()} as a holiday"`
       + ` data-act="dayset" data-set="${noSchool?'school':'holiday'}"><span class="rst-knob"></span></button>`
       + `</div>`;
  }

  if(allDone){
    h += `<div class="rst-celebrate pop">${svg('partyPopper',30,2.4)}<div><strong>Great job${pName?', '+esc(pName):''}!</strong><span>${isHBL?('You are ready for home-based learning '+(isToday?'today':'tomorrow')+'!'):(noSchool?'Everything is done. Enjoy your day off!':('You are ready for school '+(isToday?'today':'tomorrow')+'!'))}</span></div></div>`;
  } else {
    const fillSun = pct>8 ? svg('sun',16,2.6).replace('<svg','<svg class="rst-fillsun"') : '';
    h += `<div class="rst-progress"><div class="rst-progress-top"><span>${done===0?"Let's get ready":"Getting ready"}</span>`
       + `<span class="rst-count">${done} of ${total} done</span></div>`
       + `<div class="rst-track"><div class="rst-fill" style="width:${pct}%">${fillSun}</div></div></div>`;
  }

  if(state.editing){
    h += `<p class="rst-edithint">Add or remove items \u2014 you\u2019ll choose \u201cthis time only\u201d or \u201cadd to default list.\u201d</p>`;
  }
  state._addIds=new Set((state.adds||[]).map(a=>a.id));
  state._skipSet=new Set(state.skips||[]);
  let renderSecs;
  if(state.editing){
    renderSecs = SECTIONS.filter(s=> s.id==='bring' || s.id==='complete' || (s.id==='uniform' && visIds.indexOf('uniform')>-1));
  } else renderSecs = visibleSections;

  if(total===0 && !state.editing){
    h += `<div class="rst-empty">${svg('backpack',40,1.8)}<p>Nothing here yet. Tap <b>Edit list</b> to add items.</p></div>`;
  } else {
    renderSecs.forEach(sec=>{
      let secItems;
      if(state.editing){
        const tI = state.template.filter(it=> it.section===sec.id && levelOk(it,lvl) && vacationOk(it,dT,lvl) && applies(it)).map(hydrate);
        const aI = (state.adds||[]).filter(it=> it.section===sec.id && applies(it)).map(hydrate);
        secItems = tI.concat(aI);
      } else {
        secItems = items.filter(it=>it.section===sec.id && applies(it));
      }
      if(secItems.length===0 && !state.editing && sec.id!=='bring') return;
      const secTotal = countLeaves(secItems), secDone = countDoneLeaves(secItems);
      h += `<section class="rst-section"><div class="rst-section-head"><span class="rst-section-icon">${svg(sec.icon,18,2.5)}</span><h2>${esc(isToday?sec.title.replace('Tomorrow','Today'):sec.title)}</h2>`;
      if(secTotal>0 && !state.editing) h += `<span class="rst-chip${secDone===secTotal?' full':''}">${secDone}/${secTotal}</span>`;
      h += `</div>`;
      if(secItems.length===0 && !state.editing && sec.id==='bring'){
        h += `<div class="rst-bring-empty">${svg('backpack',22,2)}<span>Tap <b>Edit</b> to add to your bring list.</span></div></section>`;
        return;
      }
      h += `<div class="rst-grid">`;

      secItems.forEach(it=>{
        if(state.editing && state.removeAsk===it.id){
          h += `<div class="rst-card rst-askremove"><span class="rst-iconwrap">${svg(it.icon,34,2.2)}</span>`
             + `<span class="rst-text"><span class="rst-name">${esc(it.name)}</span>`
             + `<span class="rst-askrow">`
             + `<button class="rst-askbtn" data-act="rmchoose" data-id="${esc(it.id)}" data-scope="today">This time only</button>`
             + `<button class="rst-askbtn warn rst-hold" data-holdact="rmdefault" data-id="${esc(it.id)}"><span class="rst-holdfill"></span><span class="rst-holdlabel">Remove from default list <em class="rst-holdhint">hold</em></span></button>`
             + `<button class="rst-askbtn ghost" data-act="rmcancel">Cancel</button>`
             + `</span></span></div>`;
          return;
        }
        const isExp = !!it.expandable;
        const hasKids = it.children && it.children.length>0;
        const isContainer = !isExp && Array.isArray(it.children);
        const isSkip = state._skipSet.has(it.id);
        if(isExp){
          const kidsDone = hasKids ? it.children.filter(c=>c.done).length : 0;
          const complete = hasKids && kidsDone===it.children.length;
          const headTappable = !hasKids && !state.editing;
          const tickOn = hasKids ? complete : !!it.done;
          let status;

          else status = it.done ? 'All done!' : 'No homework today? Tap to tick.';
          h += `<div class="rst-card rst-parent expandable${tickOn?' is-done':''}${state.editing?' is-edit':''}${isSkip?' is-skipped':''}">`;

                 ? `<button class="rst-parent-head as-button" data-act="toggle" data-id="${esc(it.id)}" aria-pressed="${!!it.done}">`

             + iconCol(it)
             + `<span class="rst-text"><span class="rst-name">${esc(it.name)}</span><span class="rst-prompt">${status}</span></span>`
             + `<span class="rst-tick${hasKids?' auto':''}${tickOn?' on':''}${it.id===pop?' badgePop':''}">${tickOn?svg('check',20,3.2):''}</span>`
             + (headTappable ? `</button>` : `</div>`);

                 + (stamp ? `<span class="rst-datepill">${esc(stamp)}</span>` : '')
                 + `<span class="rst-subname">${esc(c.name)}</span>`
                 + `<span class="rst-subx" role="button" tabindex="0" data-act="sub-remove" data-id="${esc(c.id)}" aria-label="Remove ${esc(c.name)}">${svg('x',16,2.6)}</span>`

          }
          if(!state.editing){

          if(!state.editing){

              h += `<li><button class="rst-subitem${c.done?' is-done':''}" data-act="toggle" data-id="${esc(c.id)}" aria-pressed="${c.done}">`
                 + `<span class="rst-subtick${c.done?' on':''}">${c.done?svg('check',14,3.4):''}</span>`
                 + `<span class="rst-subname">${esc(c.name)}</span></button></li>`;
            });
            h += `</ul>`;
          } else {
            h += `<ul class="rst-sub">`;
            it.children.forEach(c=>{
              h += `<li><div class="rst-subitem rst-subedit">`
                 + `<span class="rst-subname">${esc(c.name)}</span>`

                 + `<input class="rst-input" id="rst-subname" placeholder="Add an item" value="${esc(state.subDraft.name)}">`
                 + `<button class="rst-ghost rst-subbtn" data-act="sub-cancel" aria-label="Cancel">${svg('x',18,2.6)}</button>`
                 + `</div>`

          h += `</div>`;
        } else if(state.editing){
          h += `<div class="rst-card is-edit${isSkip?' is-skipped':''}">${editControl(it)}<span class="rst-iconwrap">${svg(it.icon,34,2.2)}</span>`
             + `<span class="rst-text"><span class="rst-name">${esc(it.name)}</span>${it.prompt?`<span class="rst-prompt">${esc(it.prompt)}</span>`:''}</span></div>`;
        } else {
          h += `<button class="rst-card${it.done?' is-done':''}" data-act="toggle" data-id="${esc(it.id)}" aria-pressed="${it.done}">`

             + `<input class="rst-input" id="rst-prompt" placeholder="A little reminder (optional)" value="${esc(state.draft.prompt)}">`
             + `<div class="rst-iconpick">`;
          PICKER_ICONS.forEach(k=>{ h += `<button class="rst-iconopt${state.draft.icon===k?' sel':''}" data-act="pick" data-icon="${k}" aria-label="${k}">${svg(k,22,2.2)}</button>`; });

             + `<button class="rst-ghost rst-subbtn" data-act="add-cancel" aria-label="Cancel">${svg('x',18,2.6)}</button>`

    });

  h += `<footer class="rst-footer">`

     + `<button class="rst-action${state.confirmReset?' warn':''}" data-act="reset">${svg('rotateCcw',18,2.6)}${state.confirmReset?'Tap again to reset':'Reset'}</button>`
     + `<button class="rst-action${state.editing?' active':''}" data-act="edit">${svg('pencil',18,2.6)}${state.editing?'Done editing':'Edit list'}</button>`
     + `</footer>`;

  // 1) Ask for the child's name while the profile is still the default
  if(state.nameAsk){
    h += `<div class="rst-overlay"><div class="rst-modal">`
       + (state.nameAsk==='new' ? `<h2>Create a new profile</h2>` : `<h2>What\u2019s your name?</h2>`)
       + `<p>Enter your name and personalise your packing and to-do list.<br>You can change these later, if needed.</p>`
       + `<input class="rst-input" id="rst-askname" placeholder="Enter name" value="${esc(state.nameDraft)}" maxlength="20" autocomplete="off">`

       + `</div>`
       + `<div class="rst-modal-btns">`

  }
  // 2) Then the Add-to-Home-Screen nudge (only once the earlier steps are done)
  else if(state.a2hsShow){
    h += `<div class="rst-overlay"><div class="rst-modal">`
       + `<button class="rst-modal-x" data-act="a2hs-close" aria-label="Close">${svg('x',20,2.6)}</button>`;
    if(state.a2hsStep===0){
      h += `<h2>Add to Home Screen</h2>`

    } else if(state.a2hsStep===1){
      h += `<h2>Add to Home Screen?</h2>`
         + `<p>${canAutoInstall() ? 'Your browser will ask you to confirm, and the app will be added to your Home Screen.' : 'We\u2019ll show you the two steps to add it \u2014 it takes a moment.'}</p>`
         + `<div class="rst-modal-btns">`
         + `<button class="rst-ghost" data-act="a2hs-back">Back</button>`
         + `<button class="rst-primary" data-act="a2hs-confirm">${svg('check',18,2.8)} Confirm</button>`
         + `</div>`;
    } else {
      h += `<h2>Add to Home Screen</h2>`
         + (isIOS()
             ? `<div class="rst-a2hs-steps"><b>1.</b> Tap the <b>Share</b> button at the bottom of Safari.<br><b>2.</b> Scroll down and tap <b>Add to Home Screen</b>, then <b>Add</b>.</div>`
             + `<p class="rst-a2hs-note">Safari doesn\u2019t let apps do this step for you \u2014 it has to be your tap.</p>`
             : `<div class="rst-a2hs-steps"><b>1.</b> Open the browser menu (\u22ee).<br><b>2.</b> Tap <b>Add to Home Screen</b> or <b>Install app</b>.</div>`)
         + `<div class="rst-modal-btns"><button class="rst-primary" data-act="a2hs-close">${svg('check',18,2.8)} Got it</button></div>`
         + `<button class="rst-a2hs-never" data-act="a2hs-never">Don\u2019t show me again</button>`;
    }
    h += `</div></div>`;
  }

  // 3) Offer a daily reminder in the phone's own calendar
  else if(state.calAsk){
    const who=(state.profiles.find(p=>p.id===state.calAsk)||{}).name||'';
    h += `<div class="rst-overlay"><div class="rst-modal">`
       + `<h2>Set a daily reminder?</h2>`
       + `<p>Adds a repeating reminder to your calendar so packing doesn\u2019t get forgotten.</p>`
       + `<div class="rst-calpreview">${svg('bell',16,2.4)}<span>${esc(who)}: Reminder to get ready for tomorrow</span></div>`

       + `<div class="rst-modal-btns">`

  if(state.help){

    h += `<div class="rst-overlay" data-act="helpclose"><div class="rst-sheet" data-act="noop">`

       + `<div class="rst-help-body">`
       + hi('Tick as you go','Tap each item to check it. Finish everything for a little cheer. Reset clears the ticks.')
       + hi('Today vs Tomorrow','The list is for the next school day. After midnight it reads \u201cToday\u201d, and it refreshes to a fresh day at 8am Singapore time \u2014 so early-morning checking still works.')
       + hi('Homework','Tap \u201cAdd homework\u201d to list each day\u2019s tasks. Unchecked homework carries through the weekend.')
       + hi('Editing items','In Edit, you may choose to add or remove items permanently to personalize your default list or just for a day.')
       + hi('Profiles','Add a child by inputting the name and level this year. You may customise the colour. Once the level is set, it will automatically update to the next level when the new year begins.')
       + hi('Safe deleting','Deleting a profile or removing a default item needs a press-and-hold.')
       + hi('School days & holidays','Term breaks, Youth Day, Teachers\u2019 Day, Children\u2019s Day and public holidays are worked out automatically each year \u2014 nothing to update. Use the School Day / Holiday switch if a day differs, and the HBL button for a Home-Based Learning day.')
       + hi('Saving','Everything saves on this device. On iPhone, add it to your Home Screen (Share \u2192 Add to Home Screen). On Android, use the browser menu (\u22ee) \u2192 Add to Home Screen / Install app.')
       + `<div class="rst-version">Version ${APP_VERSION}</div>`
       + `</div></div></div>`;
  }

  document.getElementById('app').innerHTML = h;

  if(state.focusName){ const el=document.getElementById('rst-name'); if(el){ el.focus(); } state.focusName=false; }
  if(state.focusSub){ const el=document.getElementById('rst-subname'); if(el){ el.focus(); } state.focusSub=false; }
  { const el=document.getElementById('rst-askname'); if(el && document.activeElement!==el) el.focus(); }
  if(state.focusProf){ const el=document.getElementById('rst-profname'); if(el){ el.focus(); } state.focusProf=false; }

  if(allDone && !prevAll) celebrate();
  prevAll = allDone;
}

function commit(){ persist(); render(); }

function toggle(id){
  const became = !state.checked[id];
  if(became) state.checked[id]=true; else delete state.checked[id];
  tapSound(became); buzz(12); state.pop = became ? id : null;
  rebuild(); commit();
}
/* per-item scope actions */
function removeAdd(id){ state.adds=(state.adds||[]).filter(it=>it.id!==id); rebuild(); commit(); }
function removeTemplate(id){ state.template=(state.template||[]).filter(it=>it.id!==id); rebuild(); commit(); }
function skipToggle(id){
  const s=new Set(state.skips||[]);
  if(s.has(id)) s.delete(id); else s.add(id);
  state.skips=[...s]; rebuild(); commit();
}
function rmAsk(id){ state.removeAsk=id; state.removeArm=null; render(); }
function rmCancel(){ state.removeAsk=null; state.removeArm=null; render(); }
function rmChoose(id, scope){ state.removeAsk=null; state.removeArm=null; if(scope==='default') removeTemplate(id); else skipToggle(id); }
function soundToggle(){ state.sound=!state.sound; lsSet('rst:sound', state.sound?'on':'off'); if(state.sound){ tapSound(true); buzz(12); } render(); }
function helpToggle(){ state.help=!state.help; render(); }

function switchProfile(id){ if(id===state.current) return; persist(); state.current=id; saveProfiles(); state.editing=false; state.profileEdit=null; state.pop=null; loadProfileData(); render(); }
/* Pick the first palette colour not already taken by another child. */
function nextColor(){
  const used=new Set((state.profiles||[]).map(p=>p.color));
  const free=(PALETTE||[]).map(c=>c.id).find(id=>!used.has(id));
  return free || 'navy';
}
function profileAddOpen(){ state.profileEdit={id:null, name:'', color:'navy', level:1, confirmDel:false}; state.focusProf=true; render(); }
function profileEditOpen(){ const p=curProfile(); state.profileEdit={id:p.id, name:p.name, color:p.color, level:p.level||1, confirmDel:false}; state.focusProf=true; render(); }
function profileLevel(n){ if(state.profileEdit){ state.profileEdit.level=n; render(); } }
function profileCancel(){ state.profileEdit=null; render(); }
function profileColor(cid){ if(state.profileEdit){ state.profileEdit.color=cid; render(); } }
function profileSave(){
  const d=state.profileEdit; if(!d) return;
  const name=(d.name||'').trim()||'Profile';
  const yr=sgToday().getUTCFullYear();
  const level=d.level||1;
  if(d.id){
    const p=state.profiles.find(x=>x.id===d.id); if(p){ p.name=name; p.color=d.color; p.level=level; p.levelYear=yr; }
    saveProfiles(); state.profileEdit=null; render();
  } else {
    persist(); // save the profile we're leaving
    const id='p'+Date.now().toString(36);
    state.profiles.push({id, name, color:d.color, level, levelYear:yr});
    lsSet(pkey(id,'items'), JSON.stringify(DEFAULT_ITEMS.map(stripForSave)));
    state.current=id; saveProfiles(); state.profileEdit=null; state.editing=false; state.pop=null;
    loadProfileData(); render();
  }
}
function profileDeleteNow(){
  const d=state.profileEdit; if(!d||!d.id||state.profiles.length<=1) return;
  lsDel(pkey(d.id,'items')); lsDel(pkey(d.id,'progress'));
  state.profiles=state.profiles.filter(p=>p.id!==d.id);
  if(state.current===d.id) state.current=state.profiles[0].id;
  saveProfiles(); state.profileEdit=null; state.editing=false;
  loadProfileData(); render();
}
/* hold-to-confirm: press and hold ~1.2s to fire a destructive action */
let holdTimer=null, holdEl=null;
function holdStart(el){
  holdCancel(); holdEl=el; el.classList.add('holding');
  holdTimer=setTimeout(()=>{
    holdTimer=null; if(holdEl){ holdEl.classList.remove('holding'); holdEl=null; }
    const act=el.getAttribute('data-holdact');
    if(act==='profdelete') profileDeleteNow();
    else if(act==='rmdefault'){ state.removeAsk=null; state.removeArm=null; removeTemplate(el.getAttribute('data-id')); }
  }, 1200);
}
function holdCancel(){ if(holdTimer){ clearTimeout(holdTimer); holdTimer=null; } if(holdEl){ holdEl.classList.remove('holding'); holdEl=null; } }
function toggleEdit(){ state.editing=!state.editing; state.draft.open=null; state.removeAsk=null; state.removeArm=null; render(); }
function doReset(){
  if(state.confirmReset){
    state.checked={}; state.confirmReset=false; clearTimeout(resetTimer); clearConfetti(); rebuild(); commit();
  } else {
    state.confirmReset=true; render();
    clearTimeout(resetTimer); resetTimer=setTimeout(()=>{ state.confirmReset=false; render(); },3000);
  }
}
function addOpen(sec){ state.draft={name:'',prompt:'',icon:'backpack',open:sec}; state.focusName=true; render(); }
function addCancel(){ state.draft={name:'',prompt:'',icon:'backpack',open:null}; render(); }
function pick(icon){ state.draft.icon=icon; render(); }
function addSubmit(sec, scope){
  const name=state.draft.name.trim(); if(!name) return;
  const item={id:'it_'+Date.now()+'_'+Math.random().toString(36).slice(2,7), section:sec, name, prompt:state.draft.prompt.trim(), icon:state.draft.icon};
  if(sec==='bring') item.bucket = bringBucket();
  if(scope==='default') state.template=[...(state.template||[]), item];
  else state.adds=[...(state.adds||[]), item]; // 'today' (this time only)
  state.draft={name:'',prompt:'',icon:'backpack',open:null};
  rebuild(); commit();
}
function subOpen(id){ state.subDraft={open:id,name:''}; state.focusSub=true; render(); }
function subCancel(){ state.subDraft={open:null,name:''}; render(); }
/* Homework is stamped with the day it was set, so rolled-over work shows its age. */
function stampToday(){ return dateKey(sgToday()); }
const MON_SHORT=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function stampLabel(k){
  if(!k) return '';
  const p=String(k).split('-'); if(p.length!==3) return '';
  return String(parseInt(p[2],10)).padStart(2,'0')+' '+MON_SHORT[parseInt(p[1],10)-1];
}
function subSubmit(id){
  const name=state.subDraft.name.trim(); if(!name) return;
  const kid={id:'sub_'+Date.now()+'_'+Math.random().toString(36).slice(2,7), name, set:stampToday()};
  state.sub={...state.sub, [id]:[...(state.sub[id]||[]), kid]};
  delete state.checked[id]; // parent no longer auto-complete
  state.subDraft={open:null,name:''}; rebuild(); commit();
}
function subRemove(id){
  const ns={}; Object.keys(state.sub).forEach(k=>{ ns[k]=state.sub[k].filter(c=>c.id!==id); });
  state.sub=ns; delete state.checked[id]; rebuild(); commit();
}
/* container (e.g. Pencil Case) items live in the template, edited permanently */
function tsubSubmit(id, scope){
  const name=state.subDraft.name.trim(); if(!name) return;
  const kid={id:'pc_'+Date.now()+'_'+Math.random().toString(36).slice(2,7), name};
  if(scope==='default'){
    state.template=state.template.map(t=> t.id===id ? {...t, children:[...(t.children||[]), kid]} : t);
  } else {
    // just for this day — lives in the day's progress, not the permanent list
    state.padds={...state.padds, [id]:[...(state.padds[id]||[]), kid]};
  }
  state.subDraft={open:null,name:''}; rebuild(); commit();
}
function tsubRemove(childId){
  state.template=state.template.map(t=> (Array.isArray(t.children)&&t.children.length) ? {...t, children:t.children.filter(c=>c.id!==childId)} : t);
  // also clear it if it was only added for today
  const pa={...(state.padds||{})};
  Object.keys(pa).forEach(k=>{ pa[k]=(pa[k]||[]).filter(c=>c.id!==childId); if(!pa[k].length) delete pa[k]; });
  state.padds=pa;
  delete state.checked[childId]; rebuild(); commit();
}

function celebrate(){
  cheerSound(); buzz([25,40,25,40,60]);
  if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const colors=['#FFC93C','#1E2B50','#5AB17A','#FF8FB1','#FFE08A','#9CC3FF'];
  const c=document.getElementById('confetti'); c.innerHTML='';
  for(let i=0;i<95;i++){
    const s=document.createElement('span'); const size=8+Math.random()*9;
    s.style.left=(Math.random()*100)+'%';
    s.style.width=size+'px'; s.style.height=size+'px';
    s.style.background=colors[i%colors.length];
    s.style.borderRadius=Math.random()>0.5?'50%':'3px';
    s.style.animationDelay=(Math.random()*0.5)+'s';
    s.style.animationDuration=(2.6+Math.random()*1.8)+'s';
    c.appendChild(s);
  }
  clearTimeout(confettiTimer); confettiTimer=setTimeout(()=>{ c.innerHTML=''; },5200);
}
function clearConfetti(){ const c=document.getElementById('confetti'); if(c) c.innerHTML=''; }

const app=document.getElementById('app');
app.addEventListener('click', e=>{
  const t=e.target.closest('[data-act]'); if(!t) return;
  const act=t.getAttribute('data-act'), id=t.getAttribute('data-id'), sec=t.getAttribute('data-sec');
  if(act==='toggle') toggle(id);
  else if(act==='removeadd'){ e.stopPropagation(); removeAdd(id); }
  else if(act==='rmask'){ e.stopPropagation(); rmAsk(id); }
  else if(act==='rmcancel') rmCancel();
  else if(act==='rmchoose') rmChoose(id, t.getAttribute('data-scope'));
  else if(act==='skiponly'){ e.stopPropagation(); skipToggle(id); }
  else if(act==='unskip'){ e.stopPropagation(); skipToggle(id); }
  else if(act==='sub-remove'){ e.stopPropagation(); subRemove(id); }
  else if(act==='sub-open') subOpen(id);
  else if(act==='sub-cancel') subCancel();
  else if(act==='sub-submit') subSubmit(id);
  else if(act==='tsub-submit') tsubSubmit(id, t.getAttribute('data-scope'));
  else if(act==='tsub-remove'){ e.stopPropagation(); tsubRemove(id); }
  else if(act==='speak'){ e.stopPropagation(); speak(t.getAttribute('data-text')); }
  else if(act==='soundtoggle') soundToggle();
  else if(act==='help') helpToggle();
  else if(act==='dayset'){ const set=t.getAttribute('data-set'); const k=dateKey(tomorrow());
    const auto=autoDayType(tomorrow(), curLevel());
    setOverride(k, set===auto ? null : set);   // back to auto if it matches the calendar
    loadProfileData(); render(); }
  else if(act==='hbl'){ const k=dateKey(tomorrow());
    const on = isHBLDay(tomorrow(), curLevel());
    if(on){ const auto=autoDayType(tomorrow(), curLevel()); setOverride(k, auto==='school'? null : 'school'); }
    else setOverride(k, 'hbl');
    loadProfileData(); render(); }
  else if(act==='a2hs-start'){ state.a2hsStep=1; render(); }
  else if(act==='a2hs-back'){ state.a2hsStep=0; render(); }
  else if(act==='a2hs-confirm'){
    doInstall().then(done=>{ if(!done){ state.a2hsStep=2; render(); } });
  }
  else if(act==='a2hs-close'){ state.a2hsShow=false; state.a2hsStep=0; render(); }
  else if(act==='name-save'){
    const nm=(state.nameDraft||'').trim(); if(!nm) return;
    const yr=sgToday().getUTCFullYear();
    if(state.nameAsk==='new'){
      persist();                                    // save the child we're leaving
      const nid='p'+Date.now().toString(36);
      state.profiles.push({id:nid, name:nm, color:nextColor(), level:state.nameLevel||1, levelYear:yr});
      lsSet(pkey(nid,'items'), JSON.stringify(DEFAULT_ITEMS.map(stripForSave)));
      state.current=nid; saveProfiles();
      state.editing=false; state.pop=null;
    } else {
      const p=curProfile();
      if(p){ p.name=nm; p.level=state.nameLevel||1; p.levelYear=yr; saveProfiles(); }
    }
    state.nameAsk=false; state.nameDraft='';
    const cp=curProfile();
    if(cp && !calGet(cp.id)){ state.calAsk=cp.id; state.calTime=CAL_DEFAULT; }
    loadProfileData(); render();
  }
  else if(act==='name-cancel'){ state.nameAsk=false; state.nameDraft=''; render(); }
  else if(act==='cal-add'){
    const id=state.calAsk; const p=state.profiles.find(x=>x.id===id);
    if(p){ openCalendar(p.name, CAL_DEFAULT); calSet(id,{added:true, time:CAL_DEFAULT}); }
    state.calAsk=null; render();
  }
  else if(act==='cal-skip'){
    if(state.calAsk) calSet(state.calAsk,{added:false, skipped:dateKey(sgToday())});
    state.calAsk=null; render();
  }
  else if(act==='name-level'){ state.nameLevel=parseInt(t.getAttribute('data-level'),10)||1; render(); }
  else if(act==='a2hs-never'){ lsSet('rst:a2hs', String(Date.now())); state.a2hsShow=false; state.a2hsStep=0; render(); }
  else if(act==='helpclose'){ state.help=false; render(); }
  else if(act==='profswitch') switchProfile(id);
  else if(act==='profedit') profileEditOpen();
  else if(act==='profadd'){ state.nameAsk='new'; state.nameDraft=''; state.nameLevel=1; render(); }
  else if(act==='profcancel') profileCancel();
  else if(act==='profcolor') profileColor(t.getAttribute('data-color'));
  else if(act==='proflevel') profileLevel(parseInt(t.getAttribute('data-level'),10));
  else if(act==='profsave') profileSave();
  else if(act==='edit') toggleEdit();
  else if(act==='reset') doReset();
  else if(act==='add-open') addOpen(sec);
  else if(act==='add-cancel') addCancel();
  else if(act==='add-submit') addSubmit(sec, t.getAttribute('data-scope'));
  else if(act==='pick') pick(t.getAttribute('data-icon'));
});
app.addEventListener('keydown', e=>{
  const hb=e.target.closest && e.target.closest('[data-holdact]');
  if(hb && (e.key==='Enter' || e.key===' ')){ e.preventDefault(); const act=hb.getAttribute('data-holdact');
    if(act==='profdelete') profileDeleteNow(); else if(act==='rmdefault'){ state.removeAsk=null; state.removeArm=null; removeTemplate(hb.getAttribute('data-id')); } return; }
  if(e.target && e.target.id==='rst-askname' && e.key==='Enter'){ const b=app.querySelector('[data-act="name-save"]'); if(b && !b.disabled) b.click(); return; }
  if(e.target && e.target.id==='rst-subname' && e.key==='Enter'){ const b=app.querySelector('[data-act="sub-submit"],[data-act="tsub-submit"]'); if(b && !b.disabled) b.click(); return; }
  if(e.key!=='Enter' && e.key!==' ') return;
  const sp=e.target.closest('[data-act="speak"]'); if(sp){ e.preventDefault(); speak(sp.getAttribute('data-text')); return; }
  const t=e.target.closest('[data-act="sub-remove"],[data-act="tsub-remove"],[data-act="removeadd"],[data-act="skiponly"],[data-act="unskip"],[data-act="rmask"]'); if(!t) return;
  e.preventDefault(); e.stopPropagation();
  const a=t.getAttribute('data-act'); const did=t.getAttribute('data-id');
  if(a==='sub-remove') subRemove(did);
  else if(a==='tsub-remove') tsubRemove(did);
  else if(a==='removeadd') removeAdd(did);
  else if(a==='rmask') rmAsk(did);
  else skipToggle(did); // skiponly / unskip
  return;
});
app.addEventListener('input', e=>{
  if(e.target.id==='rst-name'){ state.draft.name=e.target.value; document.querySelectorAll('[data-act="add-submit"]').forEach(b=>{ b.disabled=!state.draft.name.trim(); }); }
  else if(e.target.id==='rst-prompt'){ state.draft.prompt=e.target.value; }
  else if(e.target.id==='rst-subname'){ state.subDraft.name=e.target.value; app.querySelectorAll('[data-act="sub-submit"],[data-act="tsub-submit"]').forEach(b=>{ b.disabled=!state.subDraft.name.trim(); }); }
  else if(e.target.id==='rst-askname'){ state.nameDraft=e.target.value; const b=app.querySelector('[data-act="name-save"]'); if(b) b.disabled=!state.nameDraft.trim(); }
  else if(e.target.id==='rst-profname'){ if(state.profileEdit){ state.profileEdit.name=e.target.value; const b=app.querySelector('[data-act="profsave"]'); if(b) b.disabled=!state.profileEdit.name.trim(); } }
});

app.addEventListener('pointerdown', e=>{ const el=e.target.closest('[data-holdact]'); if(el){ e.preventDefault(); holdStart(el); } });
window.addEventListener('pointerup', holdCancel);
window.addEventListener('pointercancel', holdCancel);
app.addEventListener('pointerleave', holdCancel);

load(); render(); refreshHolidays();
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').then(function(reg){
      reg.update();
      document.addEventListener('visibilitychange', function(){
        if(document.visibilityState === 'visible') reg.update();
      });
      var refreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', function(){
        if(refreshing) return; refreshing = true; location.reload();
      });
    }).catch(function(){});
  });
}
</script>
</body>
</html>
