<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1E2B50">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Ready for School">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Ready for School Tomorrow</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@600;700;800&display=swap');

.rst-root{
  --navy:#1E2B50; --navy-2:#2C3D6B; --navy-soft:#5A6A93;
  --yellow:#FFC93C; --yellow-soft:#FFE08A; --yellow-pale:#FFF6DC;
  --green:#5AB17A; --cream:#FBF7EF; --line:#E7E0D2;
  font-family:'Nunito',system-ui,sans-serif;
  color:var(--navy);
  background:radial-gradient(120% 60% at 50% -10%, #FFF7E0 0%, var(--cream) 55%);
  min-height:100vh; -webkit-tap-highlight-color:transparent;
}
.rst-app{ max-width:880px; margin:0 auto; padding:18px 16px 44px; }

/* header */
.rst-header{
  display:flex; align-items:center; gap:14px;
  background:linear-gradient(135deg,var(--navy) 0%,var(--navy-2) 100%);
  color:#fff; border-radius:26px; padding:18px 20px;
  box-shadow:0 12px 28px -14px rgba(30,43,80,.55);
}
.rst-sun{
  flex:none; display:grid; place-items:center; width:48px; height:48px;
  border-radius:16px; background:var(--yellow); color:var(--navy);
  box-shadow:0 0 0 5px rgba(255,201,60,.25);
}
.rst-header h1{
  font-family:'Fredoka',sans-serif; font-weight:700; font-size:1.42rem;
  line-height:1.1; margin:0; letter-spacing:.2px;
}
.rst-date{ margin:5px 0 0; font-size:.92rem; color:#D7DEF1; font-weight:700; }
.rst-weekday{ color:var(--yellow); }
.rst-dot{ margin:0 7px; opacity:.6; }

/* progress */
.rst-progress{ margin:18px 4px 4px; }
.rst-progress-top{
  display:flex; justify-content:space-between; align-items:baseline;
  font-weight:800; margin-bottom:9px;
}
.rst-progress-top span:first-child{ font-family:'Fredoka',sans-serif; font-size:1.05rem; }
.rst-count{ color:var(--navy-soft); font-size:.9rem; }
.rst-track{
  height:18px; background:#E9E3F0; border-radius:999px; overflow:hidden;
  box-shadow:inset 0 2px 4px rgba(30,43,80,.12);
}
.rst-fill{
  height:100%; border-radius:999px; min-width:18px;
  background:linear-gradient(90deg,var(--yellow-soft),var(--yellow));
  display:flex; align-items:center; justify-content:flex-end;
  transition:width .5s cubic-bezier(.34,1.4,.64,1);
}
.rst-fillsun{ color:var(--navy); margin-right:3px; }

/* celebration banner */
.rst-celebrate{
  display:flex; align-items:center; gap:14px; margin:18px 2px 4px;
  background:linear-gradient(135deg,var(--yellow) 0%,var(--yellow-soft) 100%);
  color:var(--navy); border-radius:24px; padding:18px 20px;
  box-shadow:0 12px 26px -14px rgba(255,160,0,.7);
}
.rst-celebrate svg{ flex:none; }
.rst-celebrate strong{ display:block; font-family:'Fredoka',sans-serif; font-size:1.3rem; }
.rst-celebrate span{ font-weight:700; }

/* sections */
.rst-section{ margin-top:24px; }
.rst-section-head{ display:flex; align-items:center; gap:10px; margin:0 4px 12px; }
.rst-section-icon{
  flex:none; display:grid; place-items:center; width:30px; height:30px;
  border-radius:10px; background:var(--navy); color:var(--yellow);
}
.rst-section-head h2{
  font-family:'Fredoka',sans-serif; font-weight:600; font-size:1.16rem; margin:0; flex:1;
}
.rst-chip{
  font-weight:800; font-size:.82rem; color:var(--navy-soft);
  background:#fff; border:2px solid var(--line); border-radius:999px; padding:3px 11px;
}
.rst-chip.full{ background:var(--green); color:#fff; border-color:var(--green); }

/* grid + cards */
.rst-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(250px, 1fr)); gap:13px; align-items:start; }

.rst-card{
  position:relative; display:flex; align-items:center; gap:15px; text-align:left;
  width:100%; padding:17px 18px; border:none; cursor:pointer; font:inherit;
  background:#fff; border-radius:24px;
  box-shadow:0 8px 20px -14px rgba(30,43,80,.4), 0 0 0 2px rgba(30,43,80,.05) inset;
  transition:transform .14s ease, box-shadow .2s ease, background .25s ease;
}
.rst-card:not(:disabled):active{ transform:scale(.97); }
.rst-card:focus-visible{ outline:3px solid var(--navy); outline-offset:3px; }
.rst-card.is-done{
  background:var(--yellow-pale);
  box-shadow:0 4px 14px -12px rgba(30,43,80,.3), 0 0 0 2px rgba(90,177,122,.35) inset;
}
.rst-card.is-done .rst-iconwrap{ background:#EAF6EE; color:var(--green); }
.rst-card.is-done .rst-name,.rst-card.is-done .rst-prompt{ color:var(--navy-soft); }
.rst-card.is-edit{ cursor:default; }

.rst-iconwrap{
  flex:none; display:grid; place-items:center; width:60px; height:60px;
  border-radius:18px; background:#EEF2FB; color:var(--navy);
  transition:background .25s ease, color .25s ease;
}
.rst-text{ display:flex; flex-direction:column; gap:3px; min-width:0; flex:1; }
.rst-name{ font-family:'Fredoka',sans-serif; font-weight:600; font-size:1.18rem; line-height:1.15; }
.rst-prompt{ font-size:.88rem; color:var(--navy-soft); font-weight:700; line-height:1.25; }

.rst-tick{
  flex:none; width:32px; height:32px; border-radius:50%;
  border:3px solid #D9DEEC; display:grid; place-items:center; color:#fff;
  transition:background .2s ease, border-color .2s ease;
}
.rst-tick.on{ background:var(--green); border-color:var(--green); }

/* parent card with breakdown */
.rst-parent{ flex-direction:column; align-items:stretch; gap:13px; }
.rst-parent:active{ transform:none; }
.rst-parent-head{ display:flex; align-items:center; gap:15px; }
.rst-tick.auto{ border-style:dashed; }
.rst-sub{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column; gap:8px; }
.rst-subitem{
  width:100%; box-sizing:border-box; display:flex; align-items:center; gap:12px;
  padding:12px 14px; border-radius:15px; cursor:pointer; font:inherit; font-weight:700;
  text-align:left; color:var(--navy); background:#EEF2FB; border:2px solid transparent;
  transition:background .2s ease, transform .12s ease;
}
.rst-subitem:active{ transform:scale(.98); }
.rst-subitem:focus-visible{ outline:3px solid var(--navy); outline-offset:2px; }
.rst-subitem.is-done{ background:#EAF6EE; color:var(--navy-soft); }
.rst-subtick{
  flex:none; width:26px; height:26px; border-radius:50%; border:3px solid #CCD4E6;
  display:grid; place-items:center; color:#fff; background:#fff;
  transition:background .2s ease, border-color .2s ease;
}
.rst-subtick.on{ background:var(--green); border-color:var(--green); }
.rst-subname{ flex:1; font-size:1rem; }

.rst-remove{
  position:absolute; top:-8px; right:-8px; z-index:2;
  width:34px; height:34px; border-radius:50%; cursor:pointer;
  background:#fff; color:#E26D6D; display:grid; place-items:center;
  box-shadow:0 4px 12px -4px rgba(0,0,0,.3), 0 0 0 2px #FBE0E0 inset;
}

/* add + form */
.rst-add{ grid-column:1/-1; }
.rst-addbtn{
  width:100%; padding:18px; border-radius:24px; cursor:pointer; font:inherit;
  font-family:'Fredoka',sans-serif; font-weight:600; font-size:1.05rem;
  color:var(--navy); background:#fff; border:3px dashed #C9D2EA;
  display:flex; align-items:center; justify-content:center; gap:8px;
}
.rst-addbtn:active{ transform:scale(.98); }
.rst-form{
  background:#fff; border-radius:24px; padding:16px; display:flex; flex-direction:column; gap:11px;
  box-shadow:0 8px 20px -14px rgba(30,43,80,.4);
}
.rst-input{
  width:100%; box-sizing:border-box; padding:13px 15px; font:inherit; font-weight:700;
  border:2px solid var(--line); border-radius:15px; color:var(--navy); background:var(--cream);
}
.rst-input:focus{ outline:none; border-color:var(--navy); background:#fff; }
.rst-input::placeholder{ color:#A7AFC4; }
.rst-iconpick{ display:grid; grid-template-columns:repeat(6,1fr); gap:8px; }
@media(min-width:560px){ .rst-iconpick{ grid-template-columns:repeat(8,1fr); } }
.rst-iconopt{
  aspect-ratio:1; display:grid; place-items:center; cursor:pointer;
  border-radius:13px; border:2px solid var(--line); background:var(--cream); color:var(--navy);
}
.rst-iconopt.sel{ border-color:var(--navy); background:var(--yellow-pale); color:var(--navy); }
.rst-formrow{ display:flex; gap:10px; }
.rst-ghost,.rst-primary{
  flex:1; padding:13px; border-radius:15px; cursor:pointer; font:inherit; font-weight:800;
  display:flex; align-items:center; justify-content:center; gap:7px; border:none;
}
.rst-ghost{ background:var(--cream); color:var(--navy-soft); }
.rst-primary{ background:var(--navy); color:#fff; }
.rst-primary:disabled{ opacity:.45; cursor:not-allowed; }

/* empty */
.rst-empty{
  margin-top:20px; padding:34px 24px; text-align:center; color:var(--navy-soft);
  background:#fff; border-radius:24px; border:3px dashed #D8DEEC;
}
.rst-empty p{ margin:12px 0 0; font-weight:700; }

/* footer */
.rst-footer{ display:flex; gap:12px; margin-top:22px; }
.rst-action{
  flex:1; padding:15px; border-radius:18px; cursor:pointer; font:inherit; font-weight:800;
  display:flex; align-items:center; justify-content:center; gap:8px;
  background:#fff; color:var(--navy); border:2px solid var(--line);
  transition:transform .12s ease;
}
.rst-action:active{ transform:scale(.97); }
.rst-action.active{ background:var(--navy); color:#fff; border-color:var(--navy); }
.rst-action.warn{ background:#FFE3E3; color:#C0392B; border-color:#F4C2C2; }

/* confetti */
.rst-confetti{ position:fixed; inset:0; pointer-events:none; z-index:50; overflow:hidden; }
.rst-confetti span{
  position:absolute; top:-24px; display:block;
  animation-name:rst-fall; animation-timing-function:linear; animation-fill-mode:forwards;
}
@keyframes rst-fall{
  0%{ transform:translateY(-24px) rotate(0deg); opacity:1; }
  100%{ transform:translateY(108vh) rotate(680deg); opacity:.85; }
}
.pop{ animation:rst-pop .45s cubic-bezier(.34,1.5,.6,1) both; }
@keyframes rst-pop{ 0%{ transform:scale(.7); opacity:0; } 60%{ transform:scale(1.05); } 100%{ transform:scale(1); opacity:1; } }
.badgePop{ animation:rst-badge .4s cubic-bezier(.34,1.6,.6,1) both; }
@keyframes rst-badge{ 0%{ transform:scale(0); } 70%{ transform:scale(1.3); } 100%{ transform:scale(1); } }

@media(prefers-reduced-motion:reduce){
  .rst-card,.rst-action,.rst-fill{ transition:none; }
  .pop,.badgePop{ animation:none; }
}

/* expandable card (homework: tap when empty, auto-tick when tasks added) */
.rst-parent-head.as-button{ width:100%; border:none; background:none; font:inherit; color:inherit; cursor:pointer; padding:0; text-align:left; }
.rst-parent-head.as-button:active{ transform:scale(.99); }
.rst-subx{ flex:none; display:grid; place-items:center; width:26px; height:26px; border-radius:50%; color:#C0788A; background:rgba(30,43,80,.06); margin-left:2px; }
.rst-subadd{ width:100%; padding:11px; border-radius:14px; cursor:pointer; font:inherit; font-weight:800; color:var(--navy-soft); background:#fff; border:2px dashed #C9D2EA; display:flex; align-items:center; justify-content:center; gap:7px; }
.rst-subadd:active{ transform:scale(.99); }
.rst-subform{ display:flex; gap:8px; align-items:stretch; }
.rst-subform .rst-input{ flex:1; min-width:0; }
.rst-subbtn{ flex:none; width:auto; padding:0 14px; }

/* desktop / mouse refinements */
.rst-footer{ max-width:520px; margin-left:auto; margin-right:auto; }
@media (hover:hover){
  button.rst-card:not(.is-edit):hover{ transform:translateY(-2px); box-shadow:0 16px 28px -16px rgba(30,43,80,.55), 0 0 0 2px rgba(30,43,80,.10) inset; }
  .rst-parent-head.as-button:hover{ opacity:.9; }
  .rst-subitem:hover{ background:#E4EAF7; }
  .rst-subitem.is-done:hover{ background:#E0F1E7; }
  .rst-subx:hover{ background:rgba(30,43,80,.13); color:#B5485F; }
  .rst-action:hover{ border-color:#C4CCE0; background:#FBFCFE; }
  .rst-action.active:hover{ background:#26365F; }
  .rst-action.warn:hover{ background:#FFD9D9; }
  .rst-addbtn:hover, .rst-subadd:hover{ border-color:#9DB0DE; color:var(--navy); }
  .rst-iconopt:hover{ border-color:#9DB0DE; }
  .rst-primary:hover:not(:disabled){ background:#26365F; }
  .rst-ghost:hover{ background:#EFEBE1; }
  .rst-remove:hover{ background:#FFF3F3; color:#D64545; }
}

/* header: "Tomorrow" tag + today's calendar */
.rst-head-main{ flex:1; min-width:0; }
.rst-tag{ display:inline-block; background:var(--yellow); color:var(--navy); font-weight:800; font-size:.62rem; letter-spacing:.05em; text-transform:uppercase; padding:2px 8px; border-radius:999px; margin-right:8px; vertical-align:middle; }
.rst-today{ flex:none; display:flex; flex-direction:column; align-items:center; gap:4px; }
.rst-today-cap{ font-size:.6rem; font-weight:800; letter-spacing:.08em; text-transform:uppercase; color:var(--yellow); }
.rst-cal{ width:54px; border-radius:13px; overflow:hidden; background:#fff; display:flex; flex-direction:column; text-align:center; box-shadow:0 6px 14px -8px rgba(0,0,0,.45); }
.rst-cal-top{ background:var(--yellow); color:var(--navy); font-family:'Fredoka',sans-serif; font-weight:700; font-size:.6rem; letter-spacing:.12em; padding:3px 0 2px; }
.rst-cal-num{ color:var(--navy); font-family:'Fredoka',sans-serif; font-weight:700; font-size:1.55rem; line-height:1.05; padding-top:3px; }
.rst-cal-dow{ color:var(--navy-soft); font-size:.58rem; font-weight:800; letter-spacing:.06em; text-transform:uppercase; padding:0 0 5px; }

*{box-sizing:border-box}
html,body{margin:0;padding:0}
</style>
</head>

const leafUnits = it => (it.children && it.children.length ? it.children : [it]);
const countLeaves = list => list.reduce((n,it)=>n+leafUnits(it).length,0);
const countDoneLeaves = list => list.reduce((n,it)=>n+leafUnits(it).filter(u=>u.done).length,0);

/* The "school day" rolls over at 08:00 Singapore time. Singapore is UTC+8 with no
   daylight saving, so 08:00 SGT is exactly 00:00 UTC -> using UTC dates gives an
   8am-SGT rollover precisely, and independent of the device's own timezone. */
function today(){ const n=new Date(); return new Date(Date.UTC(n.getUTCFullYear(), n.getUTCMonth(), n.getUTCDate())); }
function tomorrow(){ const d=today(); d.setUTCDate(d.getUTCDate()+1); return d; }
const dateKey = d => `${d.getUTCFullYear()}-${String(d.getUTCMonth()+1).padStart(2,'0')}-${String(d.getUTCDate()).padStart(2,'0')}`;

function lsGet(k){ try{ return localStorage.getItem(k); }catch(e){ return null; } }
function lsSet(k,v){ try{ localStorage.setItem(k,v); }catch(e){} }

/* ---------- Singapore public holidays: auto-fetched year on year, cached for
   offline use, with graceful fallback. No file or human maintenance, ever. ---------- */
const HOLIDAY_TTL = 7*24*3600*1000; // re-check at most weekly
function loadHolidays(){ try{ const r=lsGet('rst:ph'); return r?JSON.parse(r):null; }catch(e){ return null; } }
function holidaySet(){ const h=loadHolidays(); return (h&&h.dates)?h.dates:{}; }
function eachDate(start,end){
  const out=[], s=new Date(start+'T00:00:00'), e=new Date(end+'T00:00:00');
  for(let d=new Date(s); d<=e; d.setDate(d.getDate()+1)) out.push(dateKey(d));
  return out;
}
async function refreshHolidays(){
  const cache=loadHolidays(), now=Date.now();
  const y=new Date().getUTCFullYear(), need=[y, y+1];
  const have=(cache&&cache.years)||[];
  if(cache && (now-(cache.ts||0)<HOLIDAY_TTL) && need.every(yr=>have.indexOf(yr)>-1)) return;
  const dates={};
  const got=new Set();
  // Singapore public holidays (this year + next year, so Dec->Jan is covered).
  // Year-agnostic source: any future year works with no maintenance, ever.
  for(const yr of need){
    try{
      const c=new AbortController(), t=setTimeout(()=>c.abort(),7000);
      const r=await fetch('https://date.nager.at/api/v3/PublicHolidays/'+yr+'/SG',{signal:c.signal});
      clearTimeout(t);
      if(r.ok){ const a=await r.json(); a.forEach(h=>{ if(h&&h.date) dates[h.date]=h.localName||h.name||'Public holiday'; }); got.add(yr); }
    }catch(e){}
  }
  if(got.size){ lsSet('rst:ph', JSON.stringify({ts:now, years:[...got], dates})); render(); }
}

let state = { items:[], editing:false, draft:{name:'',prompt:'',icon:'backpack',open:null}, subDraft:{open:null,name:''}, confirmReset:false, focusName:false, focusSub:false };
let prevAll = false, resetTimer = null, confettiTimer = null;

function load(){
  const key = dateKey(tomorrow());
  let list = null;
  if(lsGet('rst:seed') === SEED_VERSION){
    const raw = lsGet('rst:items');
    if(raw){ try{ list = JSON.parse(raw); }catch(e){} }
  }
  if(!Array.isArray(list) || !list.length){ list = JSON.parse(JSON.stringify(DEFAULT_ITEMS)); lsSet('rst:seed', SEED_VERSION); }
  let checked = {}, sub = {};
  const rawP = lsGet('rst:progress');
  if(rawP){ try{
    const p=JSON.parse(rawP);
    if(p.date===key){ checked=p.checked||{}; sub=p.sub||{}; }
    else {
      // New planning day: normally starts fresh. But when today is Saturday or
      // Sunday, carry forward any UNCHECKED homework from the previous session
      // (Fri -> Sat, then Sat -> Sun). Carried tasks arrive unchecked.
      const dow = new Date().getUTCDay();
      if(dow===6 || dow===0){
        const pc=p.checked||{}, ps=p.sub||{};
        Object.keys(ps).forEach(itId=>{
          const carried=(ps[itId]||[]).filter(c=> !pc[c.id]);
          if(carried.length) sub[itId]=carried.map(c=>({id:c.id, name:c.name}));
        });
      }
    }
  }catch(e){} }
  state.items = list.map(it => {
    if(it.expandable){
      const kids = (sub[it.id]||[]).map(c=>({id:c.id, name:c.name, done: !!checked[c.id]}));
      return {...it, done: !!checked[it.id], children: kids};
    }
    if(it.children && it.children.length){
      return {...it, children: it.children.map(c=>({...c, done: !!checked[c.id]}))};
    }
    return {...it, done: !!checked[it.id]};
  });
  const dW=tomorrow(), tD=dW.getUTCDay(), wk=(tD===0||tD===6);
  const holL=holidaySet(); const noSch = wk || !!holL[dateKey(dW)];
  const visSec=SECTIONS.filter(s=> !((s.id==='bring'||s.id==='uniform')&&noSch) && (!s.days || s.days.indexOf(tD)>-1)).map(s=>s.id);
  const act=state.items.filter(it=> visSec.indexOf(it.section)>-1 && (!it.days || it.days.indexOf(tD)>-1));
  const t=countLeaves(act); prevAll = t>0 && countDoneLeaves(act)===t;
}

function persist(){
  const strip = it => {
    const {done, children, ...rest}=it;
    if(it.expandable) return {...rest, children:[]};
    if(children) return {...rest, children: children.map(c=>{ const {done,...cc}=c; return cc; })};
    return rest;
  };
  lsSet('rst:items', JSON.stringify(state.items.map(strip)));
  const checked = {}, sub = {};
  state.items.forEach(it=>{
    leafUnits(it).forEach(u=>{ if(u.done) checked[u.id]=true; });
    if(it.expandable) sub[it.id]=(it.children||[]).map(c=>({id:c.id, name:c.name}));
  });
  lsSet('rst:progress', JSON.stringify({date: dateKey(tomorrow()), checked, sub}));
}

function removeBtn(it){
  return `<span class="rst-remove" role="button" tabindex="0" data-act="remove" data-id="${esc(it.id)}" aria-label="Remove ${esc(it.name)}">${svg('trash2',18,2.4)}</span>`;
}

function render(){
  const dT = tomorrow();
  const tDay = dT.getUTCDay();
  const wkend = (tDay===0 || tDay===6);
  const hol = holidaySet();
  const holTomorrow = !!hol[dateKey(dT)];
  const noSchool = wkend || holTomorrow;
  const headerTitle = wkend ? 'Ready for the Weekends' : (holTomorrow ? 'Ready for the Holidays' : 'Ready for School Tomorrow');
  const visibleSections = SECTIONS.filter(sec =>
    !((sec.id==='bring'||sec.id==='uniform') && noSchool) &&
    (!sec.days || sec.days.indexOf(tDay)>-1)
  );
  const visIds = visibleSections.map(s=>s.id);
  const dayOk = it => !it.days || it.days.indexOf(tDay)>-1;
  const items = state.items;
  const activeItems = items.filter(it => visIds.indexOf(it.section)>-1 && dayOk(it));
  const total = countLeaves(activeItems), done = countDoneLeaves(activeItems);
  const allDone = total>0 && done===total;
  const pct = total ? Math.round(done/total*100) : 0;
  const weekday = dT.toLocaleDateString(undefined,{weekday:'long', timeZone:'UTC'});
  const longDate = dT.toLocaleDateString(undefined,{day:'numeric',month:'long',year:'numeric', timeZone:'UTC'});
  const tdy = today();
  const calMon = tdy.toLocaleDateString(undefined,{month:'short', timeZone:'UTC'}).toUpperCase();
  const calNum = tdy.getUTCDate();
  const calDow = tdy.toLocaleDateString(undefined,{weekday:'short', timeZone:'UTC'});

  let h = '';
  h += `<header class="rst-header"><div class="rst-sun">${svg('sun',26,2.5)}</div>`
     + `<div class="rst-head-main"><h1>${headerTitle}</h1>`
     + `<p class="rst-date"><span class="rst-tag">Tomorrow</span><span class="rst-weekday">${esc(weekday)}</span><span class="rst-dot">&bull;</span>${esc(longDate)}</p></div>`
     + `<div class="rst-today"><span class="rst-today-cap">Today</span>`
     + `<span class="rst-cal"><span class="rst-cal-top">${esc(calMon)}</span><span class="rst-cal-num">${calNum}</span><span class="rst-cal-dow">${esc(calDow)}</span></span></div>`
     + `</header>`;

  if(allDone){
    h += `<div class="rst-celebrate pop">${svg('partyPopper',30,2.4)}<div><strong>Great job!</strong><span>${wkend?'Everything is done. Enjoy your day off!':'You are ready for school tomorrow!'}</span></div></div>`;
  } else {
    const fillSun = pct>8 ? svg('sun',16,2.6).replace('<svg','<svg class="rst-fillsun"') : '';
    h += `<div class="rst-progress"><div class="rst-progress-top"><span>${done===0?"Let's get ready":"Getting ready"}</span>`
       + `<span class="rst-count">${done} of ${total} done</span></div>`
       + `<div class="rst-track"><div class="rst-fill" style="width:${pct}%">${fillSun}</div></div></div>`;
  }

  if(total===0 && !state.editing){
    h += `<div class="rst-empty">${svg('backpack',40,1.8)}<p>Nothing here yet. Tap <b>Edit list</b> to add items.</p></div>`;
  } else {
    visibleSections.forEach(sec=>{
      const secItems = items.filter(it=>it.section===sec.id && dayOk(it));
      if(secItems.length===0 && !state.editing) return;
      const secTotal = countLeaves(secItems), secDone = countDoneLeaves(secItems);
      h += `<section class="rst-section"><div class="rst-section-head"><span class="rst-section-icon">${svg(sec.icon,18,2.5)}</span><h2>${esc(sec.title)}</h2>`;
      if(secTotal>0) h += `<span class="rst-chip${secDone===secTotal?' full':''}">${secDone}/${secTotal}</span>`;
      h += `</div><div class="rst-grid">`;

      secItems.forEach(it=>{
        const isExp = !!it.expandable;
        const hasKids = it.children && it.children.length>0;
        if(isExp){
          const kidsDone = hasKids ? it.children.filter(c=>c.done).length : 0;
          const complete = hasKids && kidsDone===it.children.length;
          const headTappable = !hasKids && !state.editing;
          const tickOn = hasKids ? complete : !!it.done;
          let status;
          if(hasKids) status = complete ? 'All done!' : (kidsDone+' of '+it.children.length+' done');
          else status = it.done ? 'All done!' : 'No homework today? Tap to tick.';
          h += `<div class="rst-card rst-parent expandable${tickOn?' is-done':''}${state.editing?' is-edit':''}">`;
          if(state.editing) h += removeBtn(it);
          h += (headTappable
                 ? `<button class="rst-parent-head as-button" data-act="toggle" data-id="${esc(it.id)}" aria-pressed="${!!it.done}">`
                 : `<div class="rst-parent-head">`)
             + `<span class="rst-iconwrap">${svg(it.icon,34,2.2)}</span>`
             + `<span class="rst-text"><span class="rst-name">${esc(it.name)}</span><span class="rst-prompt">${status}</span></span>`
             + `<span class="rst-tick${hasKids?' auto':''}${tickOn?' on badgePop':''}">${tickOn?svg('check',20,3.2):''}</span>`
             + (headTappable ? `</button>` : `</div>`);
          if(hasKids){
            h += `<ul class="rst-sub">`;
            it.children.forEach(c=>{
              h += `<li><button class="rst-subitem${c.done?' is-done':''}" data-act="toggle" data-id="${esc(c.id)}" aria-pressed="${c.done}">`
                 + `<span class="rst-subtick${c.done?' on':''}">${c.done?svg('check',14,3.4):''}</span>`
                 + `<span class="rst-subname">${esc(c.name)}</span>`
                 + `<span class="rst-subx" role="button" tabindex="0" data-act="sub-remove" data-id="${esc(c.id)}" aria-label="Remove ${esc(c.name)}">${svg('x',16,2.6)}</span>`
                 + `</button></li>`;
            });
            h += `</ul>`;
          }
          if(!state.editing){
            if(state.subDraft.open===it.id){
              h += `<div class="rst-subform">`
                 + `<input class="rst-input" id="rst-subname" placeholder="${esc(it.addLabel||'Add item')}" value="${esc(state.subDraft.name)}">`
                 + `<button class="rst-ghost rst-subbtn" data-act="sub-cancel" aria-label="Cancel">${svg('x',18,2.6)}</button>`
                 + `<button class="rst-primary rst-subbtn" data-act="sub-submit" data-id="${esc(it.id)}" ${state.subDraft.name.trim()?'':'disabled'}>${svg('plus',18,2.6)} Add</button>`
                 + `</div>`;
            } else {
              h += `<button class="rst-subadd" data-act="sub-open" data-id="${esc(it.id)}">${svg('plus',20,2.6)}<span>${esc(it.addLabel||'Add item')}</span></button>`;
            }
          }
          h += `</div>`;
          return;
        }
        if(hasKids){
          const kidsDone = it.children.filter(c=>c.done).length;
          const complete = kidsDone===it.children.length;
          h += `<div class="rst-card rst-parent${complete?' is-done':''}${state.editing?' is-edit':''}">`;
          if(state.editing) h += removeBtn(it);
          h += `<div class="rst-parent-head"><span class="rst-iconwrap">${svg(it.icon,34,2.2)}</span>`
             + `<span class="rst-text"><span class="rst-name">${esc(it.name)}</span>`
             + `<span class="rst-prompt">${complete?'All packed!':(kidsDone+' of '+it.children.length+' packed')}</span></span>`
             + `<span class="rst-tick auto${complete?' on badgePop':''}">${complete?svg('check',20,3.2):''}</span></div>`;
          if(!state.editing){
            h += `<ul class="rst-sub">`;
            it.children.forEach(c=>{
              h += `<li><button class="rst-subitem${c.done?' is-done':''}" data-act="toggle" data-id="${esc(c.id)}" aria-pressed="${c.done}">`
                 + `<span class="rst-subtick${c.done?' on':''}">${c.done?svg('check',14,3.4):''}</span>`
                 + `<span class="rst-subname">${esc(c.name)}</span></button></li>`;
            });
            h += `</ul>`;
          }
          h += `</div>`;
        } else if(state.editing){
          h += `<div class="rst-card is-edit">${removeBtn(it)}<span class="rst-iconwrap">${svg(it.icon,34,2.2)}</span>`
             + `<span class="rst-text"><span class="rst-name">${esc(it.name)}</span>${it.prompt?`<span class="rst-prompt">${esc(it.prompt)}</span>`:''}</span></div>`;
        } else {
          h += `<button class="rst-card${it.done?' is-done':''}" data-act="toggle" data-id="${esc(it.id)}" aria-pressed="${it.done}">`
             + `<span class="rst-iconwrap">${svg(it.icon,34,2.2)}</span>`
             + `<span class="rst-text"><span class="rst-name">${esc(it.name)}</span>${it.prompt?`<span class="rst-prompt">${esc(it.prompt)}</span>`:''}</span>`
             + `<span class="rst-tick${it.done?' on badgePop':''}">${it.done?svg('check',20,3.2):''}</span></button>`;
        }
      });

      if(state.editing){
        h += `<div class="rst-add">`;
        if(state.draft.open!==sec.id){
          h += `<button class="rst-addbtn" data-act="add-open" data-sec="${sec.id}">${svg('plus',26,2.6)}<span>Add to ${esc(sec.title.toLowerCase())}</span></button>`;
        } else {
          h += `<div class="rst-form">`
             + `<input class="rst-input" id="rst-name" placeholder="Item name" value="${esc(state.draft.name)}">`
             + `<input class="rst-input" id="rst-prompt" placeholder="A little reminder (optional)" value="${esc(state.draft.prompt)}">`
             + `<div class="rst-iconpick">`;
          PICKER_ICONS.forEach(k=>{ h += `<button class="rst-iconopt${state.draft.icon===k?' sel':''}" data-act="pick" data-icon="${k}" aria-label="${k}">${svg(k,22,2.2)}</button>`; });
          h += `</div><div class="rst-formrow">`
             + `<button class="rst-ghost" data-act="add-cancel">${svg('x',18,2.6)} Cancel</button>`
             + `<button class="rst-primary" data-act="add-submit" data-sec="${sec.id}" ${state.draft.name.trim()?'':'disabled'}>${svg('plus',18,2.6)} Add item</button>`
             + `</div></div>`;
        }
        h += `</div>`;
      }
      h += `</div></section>`;
    });
  }

  h += `<footer class="rst-footer">`
     + `<button class="rst-action${state.confirmReset?' warn':''}" data-act="reset">${svg('rotateCcw',18,2.6)}${state.confirmReset?'Tap again to reset':'Reset'}</button>`
     + `<button class="rst-action${state.editing?' active':''}" data-act="edit">${svg('pencil',18,2.6)}${state.editing?'Done editing':'Edit list'}</button>`
     + `</footer>`;

  document.getElementById('app').innerHTML = h;

  if(state.focusName){ const el=document.getElementById('rst-name'); if(el){ el.focus(); } state.focusName=false; }
  if(state.focusSub){ const el=document.getElementById('rst-subname'); if(el){ el.focus(); } state.focusSub=false; }

  if(allDone && !prevAll) celebrate();
  prevAll = allDone;
}

function commit(){ persist(); render(); }

function toggle(id){
  state.items = state.items.map(it=>{
    if(it.children && it.children.length){
      if(!it.children.some(c=>c.id===id)) return it;
      return {...it, children: it.children.map(c=>c.id===id?{...c,done:!c.done}:c)};
    }
    return it.id===id?{...it,done:!it.done}:it;
  });
  commit();
}
function removeItem(id){ state.items = state.items.filter(it=>it.id!==id); commit(); }
function toggleEdit(){ state.editing=!state.editing; state.draft.open=null; render(); }
function doReset(){
  if(state.confirmReset){
    state.items = state.items.map(it=> it.children&&it.children.length ? {...it,children:it.children.map(c=>({...c,done:false}))} : {...it,done:false});
    state.confirmReset=false; clearTimeout(resetTimer); clearConfetti(); commit();
  } else {
    state.confirmReset=true; render();
    clearTimeout(resetTimer); resetTimer=setTimeout(()=>{ state.confirmReset=false; render(); },3000);
  }
}
function addOpen(sec){ state.draft={name:'',prompt:'',icon:'backpack',open:sec}; state.focusName=true; render(); }
function addCancel(){ state.draft={name:'',prompt:'',icon:'backpack',open:null}; render(); }
function pick(icon){ state.draft.icon=icon; render(); }
function addSubmit(sec){
  const name=state.draft.name.trim(); if(!name) return;
  state.items=[...state.items, {id:'it_'+Date.now()+'_'+Math.random().toString(36).slice(2,7), section:sec, name, prompt:state.draft.prompt.trim(), icon:state.draft.icon, done:false}];
  state.draft={name:'',prompt:'',icon:'backpack',open:null};
  commit();
}
function subOpen(id){ state.subDraft={open:id,name:''}; state.focusSub=true; render(); }
function subCancel(){ state.subDraft={open:null,name:''}; render(); }
function subSubmit(id){
  const name=state.subDraft.name.trim(); if(!name) return;
  state.items=state.items.map(it=> it.id===id ? {...it, done:false, children:[...(it.children||[]), {id:'sub_'+Date.now()+'_'+Math.random().toString(36).slice(2,7), name, done:false}]} : it);
  state.subDraft={open:null,name:''}; commit();
}
function subRemove(id){
  state.items=state.items.map(it=> (it.expandable && it.children) ? {...it, children: it.children.filter(c=>c.id!==id)} : it);
  commit();
}

function celebrate(){
  if(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  const colors=['#FFC93C','#1E2B50','#5AB17A','#FF8FB1','#FFE08A','#9CC3FF'];
  const c=document.getElementById('confetti'); c.innerHTML='';
  for(let i=0;i<95;i++){
    const s=document.createElement('span'); const size=8+Math.random()*9;
    s.style.left=(Math.random()*100)+'%';
    s.style.width=size+'px'; s.style.height=size+'px';
    s.style.background=colors[i%colors.length];
    s.style.borderRadius=Math.random()>0.5?'50%':'3px';
    s.style.animationDelay=(Math.random()*0.5)+'s';
    s.style.animationDuration=(2.6+Math.random()*1.8)+'s';
    c.appendChild(s);
  }
  clearTimeout(confettiTimer); confettiTimer=setTimeout(()=>{ c.innerHTML=''; },5200);
}
function clearConfetti(){ const c=document.getElementById('confetti'); if(c) c.innerHTML=''; }

const app=document.getElementById('app');
app.addEventListener('click', e=>{
  const t=e.target.closest('[data-act]'); if(!t) return;
  const act=t.getAttribute('data-act'), id=t.getAttribute('data-id'), sec=t.getAttribute('data-sec');
  if(act==='toggle') toggle(id);
  else if(act==='remove'){ e.stopPropagation(); removeItem(id); }
  else if(act==='sub-remove'){ e.stopPropagation(); subRemove(id); }
  else if(act==='sub-open') subOpen(id);
  else if(act==='sub-cancel') subCancel();
  else if(act==='sub-submit') subSubmit(id);
  else if(act==='edit') toggleEdit();
  else if(act==='reset') doReset();
  else if(act==='add-open') addOpen(sec);
  else if(act==='add-cancel') addCancel();
  else if(act==='add-submit') addSubmit(sec);
  else if(act==='pick') pick(t.getAttribute('data-icon'));
});
app.addEventListener('keydown', e=>{
  if(e.target && e.target.id==='rst-subname' && e.key==='Enter'){ const b=app.querySelector('[data-act="sub-submit"]'); if(b && !b.disabled) b.click(); return; }
  if(e.key!=='Enter' && e.key!==' ') return;
  const t=e.target.closest('[data-act="remove"],[data-act="sub-remove"]'); if(!t) return;
  e.preventDefault(); e.stopPropagation();
  if(t.getAttribute('data-act')==='sub-remove') subRemove(t.getAttribute('data-id'));
  else removeItem(t.getAttribute('data-id'));
});
app.addEventListener('input', e=>{
  if(e.target.id==='rst-name'){ state.draft.name=e.target.value; const b=document.querySelector('[data-act="add-submit"]'); if(b) b.disabled=!state.draft.name.trim(); }
  else if(e.target.id==='rst-prompt'){ state.draft.prompt=e.target.value; }
  else if(e.target.id==='rst-subname'){ state.subDraft.name=e.target.value; const b=app.querySelector('[data-act="sub-submit"]'); if(b) b.disabled=!state.subDraft.name.trim(); }
});

load(); render(); refreshHolidays();
</script>
</body>
</html>
